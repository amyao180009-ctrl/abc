<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIS-DF Quiz - Certified Implementation Specialist Data Foundations</title>
<style>
  :root {
    --bg-primary: #0f172a;
    --bg-secondary: #1e293b;
    --bg-card: #1e293b;
    --bg-hover: #334155;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --success: #22c55e;
    --success-bg: rgba(34,197,94,0.12);
    --error: #ef4444;
    --error-bg: rgba(239,68,68,0.12);
    --warning: #f59e0b;
    --border: #334155;
    --radius: 10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .header-title span { color: var(--accent); }
  .header-stats {
    display: flex;
    gap: 20px;
    font-size: 14px;
  }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-dot { width:8px; height:8px; border-radius:50%; }
  .stat-dot.correct { background: var(--success); }
  .stat-dot.wrong { background: var(--error); }
  .stat-dot.remaining { background: var(--text-muted); }

  /* Layout */
  .layout {
    display: flex;
    height: calc(100vh - 57px);
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h3 {
    font-size: 13px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .section-filter {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .section-filter:focus { border-color: var(--accent); }
  .section-filter option { background: var(--bg-primary); }

  .question-nav {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-content: flex-start;
  }
  .question-nav::-webkit-scrollbar { width: 4px; }
  .question-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .q-btn {
    width: 38px;
    height: 38px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-primary);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .q-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .q-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .q-btn.answered-correct { background: var(--success); color: #fff; border-color: var(--success); }
  .q-btn.answered-wrong { background: var(--error); color: #fff; border-color: var(--error); }
  .q-btn.multi-indicator::after {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--warning);
    position: absolute;
    top: 2px; right: 2px;
  }
  .q-btn { position: relative; }

  /* Main content */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    justify-content: center;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .question-card {
    max-width: 800px;
    width: 100%;
  }

  .q-meta {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .q-badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .q-badge.section {
    background: rgba(59,130,246,0.15);
    color: #60a5fa;
  }
  .q-badge.multi {
    background: rgba(245,158,11,0.15);
    color: #fbbf24;
  }
  .q-badge.number {
    background: rgba(148,163,184,0.15);
    color: var(--text-secondary);
  }

  .q-text {
    font-size: 18px;
    line-height: 1.7;
    color: var(--text-primary);
    margin-bottom: 28px;
    font-weight: 500;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .option-item {
    padding: 16px 20px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-primary);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .option-item:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(59,130,246,0.06);
  }
  .option-item.selected {
    border-color: var(--accent);
    background: rgba(59,130,246,0.1);
  }
  .option-item.correct {
    border-color: var(--success);
    background: var(--success-bg);
  }
  .option-item.wrong {
    border-color: var(--error);
    background: var(--error-bg);
  }
  .option-item.disabled {
    cursor: default;
  }
  .option-item.show-correct {
    border-color: var(--success);
    background: var(--success-bg);
  }

  .option-letter {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg-hover);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: var(--text-secondary);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .option-item.selected .option-letter {
    background: var(--accent);
    color: #fff;
  }
  .option-item.correct .option-letter {
    background: var(--success);
    color: #fff;
  }
  .option-item.wrong .option-letter {
    background: var(--error);
    color: #fff;
  }
  .option-item.show-correct .option-letter {
    background: var(--success);
    color: #fff;
  }

  .option-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-primary);
    padding-top: 4px;
  }

  .option-icon {
    margin-left: auto;
    font-size: 20px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled {
    background: var(--bg-hover);
    color: var(--text-muted);
    cursor: not-allowed;
  }
  .btn-secondary {
    background: var(--bg-hover);
    color: var(--text-primary);
  }
  .btn-secondary:hover { background: var(--border); }
  .btn-secondary:disabled {
    color: var(--text-muted);
    cursor: not-allowed;
  }

  /* Result banner */
  .result-banner {
    padding: 16px 20px;
    border-radius: var(--radius);
    margin-bottom: 20px;
    display: none;
    align-items: center;
    gap: 12px;
    font-size: 15px;
    font-weight: 600;
  }
  .result-banner.show { display: flex; }
  .result-banner.correct-banner {
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid rgba(34,197,94,0.3);
  }
  .result-banner.wrong-banner {
    background: var(--error-bg);
    color: var(--error);
    border: 1px solid rgba(239,68,68,0.3);
  }
  .result-icon { font-size: 24px; }

  /* Explanation */
  .explanation {
    margin-top: 20px;
    padding: 20px;
    border-radius: var(--radius);
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.2);
    display: none;
  }
  .explanation.show { display: block; }
  .explanation-title {
    font-size: 13px;
    text-transform: uppercase;
    color: #60a5fa;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    font-weight: 700;
  }
  .explanation-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
  }

  /* Navigation */
  .nav-bar {
    display: flex;
    justify-content: space-between;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  /* Welcome screen */
  .welcome {
    text-align: center;
    padding: 60px 20px;
  }
  .welcome-icon { font-size: 64px; margin-bottom: 20px; }
  .welcome h2 {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 12px;
  }
  .welcome h2 span { color: var(--accent); }
  .welcome p {
    color: var(--text-secondary);
    font-size: 16px;
    line-height: 1.6;
    max-width: 500px;
    margin: 0 auto 32px;
  }
  .welcome-stats {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-bottom: 32px;
  }
  .welcome-stat {
    background: var(--bg-card);
    padding: 16px 24px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .welcome-stat-val { font-size: 28px; font-weight: 800; color: var(--accent); }
  .welcome-stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  /* Mode selector */
  .mode-selector {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .mode-btn {
    padding: 14px 32px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    transition: all 0.2s;
  }
  .mode-btn:hover { border-color: var(--accent); }
  .mode-btn .mode-icon { font-size: 20px; display: block; margin-bottom: 6px; }
  .mode-btn .mode-desc { font-size: 12px; color: var(--text-muted); font-weight: 400; }

  /* Progress bar */
  .progress-bar {
    height: 3px;
    background: var(--border);
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 16px; }
    .q-text { font-size: 16px; }
    .header-stats { gap: 12px; font-size: 12px; }
  }

  /* Scrollbar for sidebar */
  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Filter buttons */
  .filter-row {
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(59,130,246,0.1);
  }

  /* Shuffle toggle */
  .shuffle-toggle {
    display: flex;
    justify-content: center;
  }
  .shuffle-label {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }
  .shuffle-label input { display: none; }
  .shuffle-switch {
    width: 48px;
    height: 26px;
    background: var(--bg-hover);
    border-radius: 13px;
    position: relative;
    transition: background 0.25s;
    flex-shrink: 0;
  }
  .shuffle-switch::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--text-muted);
    top: 3px; left: 3px;
    transition: all 0.25s;
  }
  .shuffle-label input:checked + .shuffle-switch {
    background: var(--accent);
  }
  .shuffle-label input:checked + .shuffle-switch::after {
    transform: translateX(22px);
    background: #fff;
  }
  .shuffle-text {
    font-size: 14px;
    color: var(--text-secondary);
  }
  .shuffle-label input:checked ~ .shuffle-text {
    color: var(--accent);
  }

  /* Header restart button */
  .header-restart {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .header-restart:hover {
    border-color: var(--error);
    color: var(--error);
    background: rgba(239,68,68,0.08);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 14px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    z-index: 1000;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); color: #fff; }
  .toast.error { background: var(--error); color: #fff; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">CIS-<span>DF</span> Quiz</div>
  <div class="header-stats">
    <div class="stat"><div class="stat-dot correct"></div> <span id="correctCount">0</span> 正确</div>
    <div class="stat"><div class="stat-dot wrong"></div> <span id="wrongCount">0</span> 错误</div>
    <div class="stat"><div class="stat-dot remaining"></div> <span id="remainingCount">0</span> 剩余</div>
    <button class="header-restart" onclick="restartQuiz()" title="重新开始">🔄 重新开始</button>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>章节筛选</h3>
      <select class="section-filter" id="sectionFilter">
        <option value="all">全部章节</option>
      </select>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="unanswered">未答</button>
      <button class="filter-btn" data-filter="correct">正确</button>
      <button class="filter-btn" data-filter="wrong">错误</button>
    </div>
    <div class="sidebar-scroll">
      <div class="question-nav" id="questionNav"></div>
    </div>
  </div>
  <div class="main" id="mainContent">
    <!-- Content rendered by JS -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== QUESTIONS DATA =====
const QUESTIONS = [{"num": 1, "question": "A CMDB Administrator has built a number of Technology Managemen t Service Offerings (Technical Service Offerings) based on Dynamic CI Groups to better maintai n group alignment for the member CI. Which Groups are synced to CIs from the offering that has a rel ationship to a Dynamic CI Group? (Choose two.)", "options": {"A": "Approval Group", "B": "Managed by Group", "C": "Support Group", "D": "Owned by Group"}, "answer": "CD", "section": "Configuration", "explanation": "When a Technology Management Service Offering is related to a D ynamic CI Group, the Support Group and Owned by Group defined on the offering are synchronized to the member CIs to maintain consistent operational ownership and support alignment.", "multi": true}, {"num": 3, "question": "A new custom class is needed to reflect a new application being managed in the CMDB. Which roles are minimally needed to add this custom CI class?", "options": {"A": "A cmdb_inst_admin and personalize_form", "B": "itil_admin and personalize_form", "C": "data_classification_admin and personalize_dictionary", "D": "sn_cmdb_admin and personalize_dictionary"}, "answer": "D", "section": "Configuration", "explanation": "Creating a custom CI class requires CMDB administrative privile ges along with dictionary personalization access to define the new class and its attributes within the CM DB data model.", "multi": false}, {"num": 4, "question": "What is the relationship between an application and a server?", "options": {"A": "Application>Used by::Uses>Server", "B": "Application> Uses::Used by>Server", "C": "Application>Runs::Runs On>Server", "D": "Application>Runs on::Runs>Server"}, "answer": "D", "section": "Configuration", "explanation": "An application runs on a server, so the correct relationship mo dels the application as running on the server and the server as running the application.", "multi": false}, {"num": 5, "question": "User endpoint devices are imported into the CMDB and populate t he ‘Assigned to’ [assigned_to] field on the Computer [cmdb_ci_computer] CI. The Asset team puts in a re quest for the Configuration Analysts to populate the ‘Assigned to’ field on the related Asset. What action does a Configuration Analyst take to achieve this i n an automated way?", "options": {"A": "Use the Asset-CI Field Mapping module to create a new rule to replicate the ‘Assigned to’ value between the asset and associated CI", "B": "Hide the ‘Assigned to’ field on the asset record and create a new field that dot walks to the related CI to get the ‘Assigned to’ value", "C": "Configure a business rule on the computer table to use a scri pt to populate the ‘Assigned to’ filed on the asset based on insert or update in the computer class ‘Assi gned to’ field"}, "answer": "A", "section": "Configuration", "explanation": "Asset-CI Field Mapping allows automated synchronization of fiel d values such as the Assigned to attribute between a CI and its related asset without requiring custom scr ipting.", "multi": false}, {"num": 6, "question": "A CMDB Administrator needs to create a new CI class for the Int ernet of Things (IoT) Sensor in ServiceNow. What are the recommended practices for this specific activity? (Choose two.)", "options": {"A": "Add a new class under an appropriate parent class", "B": "Modify an existing class", "C": "Install or update the CMDB CI Class Models store application, and verify the class does not already exist", "D": "Delete an unused class, and replace it with the new one"}, "answer": "AC", "section": "Configuration", "explanation": "Creating a new CI class should be done by extending an appropri ate existing parent class to maintain CMDB data model integrity, and by verifying through the CMDB CI Class Models store application that the required class does not already exist before creating a new one .", "multi": true}, {"num": 7, "question": "A Change Manager aims to streamline ITSM processes by automatic ally populating fields on the Change form when a CI is selected. The Configuration Management team i s working to ensure that the Change Group field is populated for all managed CIs. As a result, which base system field on the incident form will be automatically populated after selecting a CI?", "options": {"A": "Managed by group", "B": "Approval group", "C": "Assignment group", "D": "Change group"}, "answer": "C", "section": "Configuration", "explanation": "When a CI has its Change Group populated, selecting that CI on a Change or Incident form automatically sets the Assignment Group based on the CI’s defined support res ponsibility.", "multi": false}, {"num": 8, "question": "A Data Center Manager is working with the CMDB CI Class Manager to define the relationship between Application Servers and the Applications they host. The company has multiple Application Servers that host one or more Applications. Which describes the relationship between the Application Server table ([cmdb_ci_app_server]) and the Application table ([cmdb_ci_appl])?", "options": {"A": "Many-to-one", "B": "One-to-one", "C": "One-to-many", "D": "Many-to-many"}, "answer": "C", "section": "Configuration", "explanation": "An application server can host multiple applications, establish ing a one-to-many relationship between the application server and the applications it supports.", "multi": false}, {"num": 9, "question": "A CMDB Administrator needs to identify which attributes have be en created specifically for the Windows Server class. Which tab in the Attributes section is used?", "options": {"A": "All", "B": "Derived", "C": "Added", "D": "Child"}, "answer": "C", "section": "Configuration", "explanation": "The Added tab displays attributes that were created directly on the Windows Server class rather than inherited from parent classes.", "multi": false}, {"num": 10, "question": "An Asset Manager wants to ensure that Asset records and CI reco rds are kept synchronized automatically. How does the Manager do this? (Choose two.)", "options": {"A": "Ensure one-to-one physical mapping between Asset and CI", "B": "Ensure that scheduled jobs are run during off-business hours to ensure sync happens", "C": "Ensure that the business rule to update Asset fields on chang e on the CI table is active", "D": "Ensure that the business rule to update CI fields on change o n the asset table is active"}, "answer": "CD", "section": "Configuration", "explanation": "Out-of-the-box business rules synchronize field updates between CI and Asset records by updating the related record when changes occur on either table, ensuring bot h stay aligned automatically.", "multi": true}, {"num": 11, "question": "The CMDB Configuration Management team has successfully develop ed a healthy and trusted CMDB. They have integrated discovered infrastructure data, accurately referenced non-discoverable data (such as change and support group information), and made the CMDB servic e-aware using Service Mapping. Which field on an Incident form is automatically populated afte r a CI is selected that references an appropriate support group?", "options": {"A": "Support Group", "B": "Approval Group", "C": "Change Group", "D": "Assignment Group", "E": "Managed by Group"}, "answer": "D", "section": "Configuration", "explanation": "Selecting a CI that has an associated support group automatical ly populates the Assignment Group on the Incident form to route the incident to the responsible support team.", "multi": false}, {"num": 12, "question": "A Configuration Management Process Owner is preparing solution options for presentation to the technical governance board for ingesting custom CIs to the CMDB. The solu tion needs to align with best practice, minimize the cost of future work (technical debt) and ensure co mpliance with future upgrades. Which solutions accomplish this? (Choose two.)", "options": {"A": "Repurposing a base CI class and rename attributes, as require d", "B": "Extending an existing CI class table to accommodate the custo m CI class attributes", "C": "Installing or upgrading the ‘CMDB CI Class Models’ store appl ication to find a suitable existing CI class accommodating any new attributes", "D": "Extending an existing Asset class table to accommodate the cu stom CI class attributes"}, "answer": "BC", "section": "Configuration", "explanation": "Extending an appropriate existing CI class preserves alignment with the CMDB data model and reduces upgrade risk, while using the CMDB CI Class Models store applic ation helps identify suitable standard classes before introducing customization.", "multi": true}, {"num": 13, "question": "A CMDB Administrator wants only the CIs of Principal Classes to appear in CI reference fields, for example the CI reference fields accessible from an Incident For m. Where does the CMDB Administrator designate Principal Classes?", "options": {"A": "CI Class Manager", "B": "CMDB Workspace", "C": "CMDB Data Manager", "D": "System Properties"}, "answer": "A", "section": "Configuration", "explanation": "Principal Classes are designated in the CI Class Manager to con trol which CI classes are available for selection in reference fields such as those on Incident forms.", "multi": false}, {"num": 14, "question": "A Configuration Manager is managing a CI class in the CMDB. The identification rule(s) needs an update. Where can the Configuration Manager view and configure the exis ting identification rule(s) for the class? (Choose two.)", "options": {"A": "CI Identifiers module", "B": "API Integrations", "C": "IRE Application", "D": "CI Class Manager"}, "answer": "AD", "section": "Configuration", "explanation": "Identification rules for configuration item classes can be view ed and configured in the CI Identifiers module, which provides direct access to the rules used by the I dentification and Reconciliation Engine to uniquely identify CIs. They can also be managed through the CI Class Manager, which allows administrators to review and configure identification rules ass ociated with specific CMDB classes as part of class configuration.", "multi": true}, {"num": 15, "question": "A CMDB Administrator wants to ensure that only relevant CIs fro m managed classes will be shown on Incident, Problem, and Change records. Which checkbox needs to be checked in the CI Class Manager for the CMDB Administrator to achieve the requested result?", "options": {"A": "Principal Class", "B": "Independent", "C": "Main Record", "D": "Extensible"}, "answer": "A", "section": "Configuration", "explanation": "The Principal Class setting in CI Class Manager designates a cl ass as a primary class that should be available for selection in task records such as Incident, Probl em, and Change. When this option is enabled, configuration items from that class are considered rel evant operational CIs and appear in reference fields used by these processes.", "multi": false}, {"num": 16, "question": "A Configuration Management team has decided to start taking adv antage of the CMDB 360/Multisource CMDB functionality. Which system property must be enabled?", "options": {"A": "glide.identification_engine.multisource_enabled", "B": "glide.identification_engine.multisource.query.max.limit", "C": "glide.identification_engine.multisource_non_cmdb_ci_enabled", "D": "glide.identification_engine.multisource_cmdb_ci_enabled"}, "answer": "A", "section": "Configuration", "explanation": "The multisource capability used by CMDB 360 requires enabling t he property that activates multisource functionality in the Identification and Reconciliation Engine. When this property is enabled, the CMDB can retain and analyze CI attribute values coming from multiple dat a sources, allowing CMDB 360 and Multisource CMDB features to compare, report, and provide insig ht into those different sources.", "multi": false}, {"num": 17, "question": "A CMDB Administrator is creating technical documentation for st akeholders, which includes a list of attributes, Identification and Reconciliation Engine (IRE) rule s, and suggested relationships for several classes. Which central location does the CMDB Administrator use to colle ct this information?", "options": {"A": "CI Class Manager", "B": "CI Identifiers", "C": "CMDB Workspace", "D": "CMDB Data Manager"}, "answer": "A", "section": "Configuration", "explanation": "CI Class Manager provides a centralized interface to review and manage CMDB class configurations. It displays class attributes, identification rules used by the Ide ntification and Reconciliation Engine, and recommended relationships for each CI class, making it the prim ary place to gather documentation about class structure and configuration.", "multi": false}, {"num": 18, "question": "A CMDB Administrator wants to configure IRE rules for the CMDB. The CMDB Administrator opens CI Class Manager and sees the Health Inclusions Rules tab availabl e under a CI Class. How are these rules utilized by the IRE?", "options": {"A": "To narrow the scope of CIs included in the identification pro cess", "B": "To reduce the data ingested into the CMDB", "C": "To reconcile specific attributes based on data sources"}, "answer": "A", "section": "Configuration", "explanation": "Health Inclusion Rules define which configuration items of a cl ass are included in CMDB Health calculations and evaluation. These rules help narrow the scope of CIs that the system evaluates for identification and health-related assessments, ensuring that on ly relevant CIs are considered when the Identification and Reconciliation Engine processes and evaluate s CMDB data quality.", "multi": false}, {"num": 19, "question": "A Windows administration team wants a grouping of CIs using CMD B groups. Which methods can be used? (Choose two.)", "options": {"A": "Tag-based queries", "B": "Scripted queries", "C": "Saved queries", "D": "Encoded queries"}, "answer": "BC", "section": "Configuration", "explanation": "CMDB groups can be populated using scripted queries or saved qu eries. Scripted queries allow administrators to dynamically define group membership using cus tom logic. Saved queries use predefined CMDB filters to automatically include configuration items that match the specified conditions, enabling dynamic CI grouping.", "multi": true}, {"num": 20, "question": "A CMDB Administrator is managing group data from both the CI Cl ass Manager and a Technical Service Offering for a specific class. Cl Class Manager: - Managed by Group = Enterprise IT Services Technical Service Offering: - Managed by Group = Windows Support - Change Group = Change Management Team What would be the Managed By Group for CIs from this class base d on the configured values?", "options": {"A": "Windows Support", "B": "Enterprise IT Services", "C": "Change Management Team"}, "answer": "A", "section": "Configuration", "explanation": "When a Managed by Group is defined on a Technical Service Offer ing, it takes precedence over the Managed by Group defined at the CI class level in CI Class Mana ger. Therefore, configuration items associated with that technical service offering inherit the Man aged by Group from the service offering configuration.", "multi": false}, {"num": 21, "question": "A Configuration Manager wants to manage manually maintained dat a attributes of CIs. Which group values are automatically synchronized on CIs using Technology Management Offerings (Technical Service Offerings) and dynamic CI groups? (Choose tw o.)", "options": {"A": "Change group", "B": "Approval group", "C": "Support group", "D": "CMDB group"}, "answer": "AC", "section": "Configuration", "explanation": "Technology Management Offerings and dynamic CI groups automatic ally synchronize operational ownership fields on configuration items. The Change group is us ed to determine which team is responsible for implementing changes affecting the CI, and the Support grou p identifies the team responsible for ongoing operational support. These values are propagated from t he service offering configuration to the associated CIs to ensure consistent ownership and operational m anagement.", "multi": true}, {"num": 22, "question": "A CMDB Administrator is tasked with managing the CMDB and needs to define a new CI class to track a new type of equipment that has not been seen before. Which action adds a new CI class and ensures it integrates prop erly with the existing CMDB structure?", "options": {"A": "Use Service Catalog to define the new CI class, as the CI Cla ss Manager is only for service-related records and not for hardware CIs", "B": "Edit an existing CI class under CI Class Manager and add new fields specific to the new equipment type", "C": "Create a new CI class directly in the CI Class Manager and co nfigure the table inheritance to ensure it inherits from a relevant parent class", "D": "Use the CI Class Manager to create a new CI class but avoid s etting up any inheritance, as CI classes should be independent of one another to maintain clarity"}, "answer": "C", "section": "Configuration", "explanation": "A new CI class should be created in CI Class Manager with prope r table inheritance from an appropriate parent class in the CMDB hierarchy. Inheritance ensures the new class automatically receives standard attributes, relationships, and behaviors from the parent class, allowing it to integrate correctly with the existing CMDB structure and maintain alignment with the CMDB da ta model.", "multi": false}, {"num": 23, "question": "A Configuration Manager needs to restrict the number of classes available in a Configuration Item reference field on an incident form. How does the Manager set Principal Classes?", "options": {"A": "By using the Principal Class check box on the CI Class Manage r's 'Basic Info' tab for a Class", "B": "By using the Principal Class check box on the CI Class Manage r's 'Attributes' tab for a Class", "C": "By using the Principal Class attribute on the CI", "D": "By using the Principal Class check box on the CMDB Workspace"}, "answer": "A", "section": "Configuration", "explanation": "Principal Classes are configured in the CI Class Manager on the Basic Info tab for a CI class. When the Principal Class checkbox is selected, configuration items from that class become available in CI reference fields used in operational processes such as Incident, Problem, and Change, allowing administrators to control which CI classes appear in those reference fields.", "multi": false}, {"num": 24, "question": "A CMDB Administrator aims to utilize CSDM life cycle field mapp ings to better align with CSDM best practices. What is the next step to take after selecting the Enable Life C ycle Sync button?", "options": {"A": "Resolve any incomplete field mappings identified in the Discr epancy Report", "B": "Fix the incorrect values in the Life Cycle Stage to match leg acy values", "C": "Activate the CSDM Life Cycle field mappings"}, "answer": "A", "section": "Configuration", "explanation": "After enabling Life Cycle Sync, the platform generates a discre pancy report that identifies incomplete or conflicting lifecycle field mappings. The next step is to resol ve these discrepancies so that legacy lifecycle fields properly align with the CSDM lifecycle stage and status model before synchronization can function correctly.", "multi": false}, {"num": 25, "question": "A CMDB Administrator needs to set a CI Class as a Principal Cla ss. Which CI Class Manager tab would need to be accessed?", "options": {"A": "Health > Attributes", "B": "Class Info > Attributes", "C": "Class Info > Basic Info"}, "answer": "C", "section": "Configuration", "explanation": "The Principal Class setting is configured in the CI Class Manag er under the Basic Info section of the Class Info tab. This setting designates the class as a principal clas s so that configuration items from that class appear in CI reference fields used in operational records such as incidents, problems, and changes.", "multi": false}, {"num": 26, "question": "A ServiceNow Administrator needs to create multiple new classes in the CMDB but wants to follow ServiceNow's best practices for naming CMDB tables to prevent t echnical debt. Which is the starting prefix for all custom CMDB tables?", "options": {"A": "ci_cmdb", "B": "cmdb_ci", "C": "u_cmdb_ci", "D": "u_ci_cmdb"}, "answer": "C", "section": "Configuration", "explanation": "ServiceNow best practice requires custom CMDB classes to use th e prefix u_cmdb_ci so that they clearly follow the CMDB table naming convention while also identifying the table as a customer-created extension. This ensures the class fits properly within the CMDB hierarchy and avoids conflicts with out-of-box tables during upgrades.", "multi": false}, {"num": 27, "question": "A Configuration Management team needs to prevent duplicate serv er records to avoid confusion among users. Server records are identified when they are processed vi a the Identification and Reconciliation Engine (IRE) using the configured identification rules. Where would these rules be configured?", "options": {"A": "CMDB Workspace", "B": "CMDB CI Class Manager", "C": "CMDB Health Dashboard", "D": "CMDB Data Manager"}, "answer": "B", "section": "Configuration", "explanation": "Identification rules used by the Identification and Reconciliat ion Engine are configured in the CI Class Manager for each CI class. This interface allows administrators to define the identifiers that uniquely distinguish configuration items, ensuring that incoming data is matched correctly and preventing the creation of duplicate records in the CMDB.", "multi": false}, {"num": 28, "question": "A CMDB Administrator notices that CIs do not have a support gro up. How can the support group be automatically populated and mainta ined on the CI record?", "options": {"A": "Technology Management Service Offering (Technical Service Off ering)", "B": "Technology Management Service (Technical Service)", "C": "CI Class Manager", "D": "Dynamic CI group"}, "answer": "A", "section": "Configuration", "explanation": "Technology Management Service Offerings automatically synchroni ze operational ownership fields such as Support Group to the configuration items associated with the offering. When a CI is linked to a Technical Service Offering, the Support Group defined on that o ffering is automatically populated and maintained on the CI record.", "multi": false}, {"num": 29, "question": "Using CI Class Manager, the Tomcat identification rule has the following criterion attributes configured: ● Class ● Install Directory Which identifier entry configuration option must be checked to attempt a match using the Application identification rule if no match is found using the Tomcat ident ification rule?", "options": {"A": "Allow fallback to parent's rules", "B": "Independent", "C": "Applies to", "D": "Criterion attributes"}, "answer": "A", "section": "Configuration", "explanation": "The Allow fallback to parent's rules option enables the Identif ication and Reconciliation Engine to attempt identification using the parent class identification rules when a match cannot be found using the child class rule. In this case, if the Tomcat identification rule does not find a match using its criteria, the system will fall back to the Application class identification rule to attempt id entification.", "multi": false}, {"num": 30, "question": "A CMDB CI Class Owner has been asked to change the icon for the UNIX Server class. Which CI Class Manager tab can the owner use to change the icon for the class?", "options": {"A": "CI List", "B": "Basic Info", "C": "Attributes", "D": "Suggested Relationships"}, "answer": "B", "section": "Configuration", "explanation": "The icon for a CI class is configured in the Basic Info tab wit hin CI Class Manager. This tab contains the core configuration settings for the class, including display pr operties such as the icon that represents the CI class in the platform.", "multi": false}, {"num": 31, "question": "A Configuration Manager is reviewing the life cycle of CIs to e nsure data accuracy, consistency, and relevance. The manager reviews the legacy status values and the ir equivalent CSDM life cycle stage and life cycle stage status values. Where are these reviewed?", "options": {"A": "Life cycle choice list", "B": "Life cycle mappings", "C": "Life cycle properties"}, "answer": "B", "section": "Configuration", "explanation": "Life cycle mappings display the relationship between legacy sta tus values and the corresponding CSDM life cycle stage and life cycle stage status values. This mappi ng allows administrators to review and align existing status fields with the standardized CSDM lifecycle mod el to ensure consistent lifecycle management across configuration items.", "multi": false}, {"num": 32, "question": "An organization is updating the CMDB to include new asset types like IoT devices. Relevant CI classes need to be added and outdated ones need to be removed from the Principal Class filter to ensure accurate display in ITSM processes. Which roles are needed to add or remove classes? (Choose two.)", "options": {"A": "personalize_dictionary", "B": "sn_csdm_admin", "C": "sn_cmdb_admin", "D": "cmdb_query_builder"}, "answer": "BC", "section": "Configuration", "explanation": "The sn_cmdb_admin role provides administrative permissions to m anage CMDB structure, including creating, modifying, and managing CI classes within CI Class Ma nager. The sn_csdm_admin role allows administrators to manage CSDM-related configurations, including adjustments to principal classes and other CMDB structure elements aligned with the CSDM model.", "multi": true}, {"num": 33, "question": "An IT group has a requirement to upgrade all the Windows server s. There is a Dynamic CI Group containing all the Windows servers. What happens to the Dynamic CI Group when it is referenced from the Configuration Item field on a Change form?", "options": {"A": "It displays all related CIs in the Impacted Services related list.", "B": "It calculates impact against the Dynamic CI Group.", "C": "It displays all related CIs in the Affected CIs related list."}, "answer": "C", "section": "Configuration", "explanation": "When a Dynamic CI Group is referenced in the Configuration Item field on a Change record, the platform expands the group and automatically lists all configuration ite ms contained in that group in the Affected CIs related list. This allows the change to clearly identify all im pacted configuration items associated with the dynamic group.", "multi": false}, {"num": 34, "question": "A CMDB Administrator is working in the CI Class Manager on the Basic Info tab. How can the class be set as a Principal Class?", "options": {"A": "Check the Principal Class check box", "B": "Click the Principal Class UI Action button", "C": "Select 'Yes' from the Principal Class choice list"}, "answer": "A", "section": "Configuration", "explanation": "In CI Class Manager, the Basic Info tab contains a checkbox lab eled Principal Class. Selecting this checkbox designates the class as a principal class so that conf iguration items from that class can appear in CI reference fields used by ITSM processes such as Incident, Problem, and Change.", "multi": false}, {"num": 35, "question": "A global enterprise integrates data from multiple discovery sou rces such as ServiceNow Discovery, SCCM, AWS, and manual uploads to populate its CMDB. However, ea ch discovery source categorizes the same CIs differently, leading to duplicate records and inconsis tencies across the system. As a result, the CMDB team is struggling with data accuracy and standardization. What actions does the CMDB team take to resolve the issue? (Cho ose two.)", "options": {"A": "Allow each discovery source to define its own CI class, even if it results in inconsistencies", "B": "Implement and use identification and reconciliation rules to avoid duplicates and standardize CI classification", "C": "Create a custom script to manually adjust incoming data befor e storing it in the CMDB", "D": "Use CI Class Manager to establish standardized CI classes and attributes across all discovery sources"}, "answer": "BD", "section": "Configuration", "explanation": "Identification and reconciliation rules ensure that incoming da ta from multiple discovery sources is correctly matched to existing configuration items and reconcile d according to defined priorities, preventing duplicate records and maintaining consistent CI classification. CI Class Manager is used to define standardized CI classes and attributes across the CMDB, ensuring that all discovery sources populate data into the correct class es and follow the same CMDB data model structure.", "multi": true}, {"num": 36, "question": "A CMDB CI Class Owner responsible for the Windows Servers needs to manage the Windows Server class. Which CI Class Manager feature will help the CI Class Owner str eamline this task?", "options": {"A": "Pinned Classes", "B": "CI Favorites", "C": "Search CI Classes"}, "answer": "A", "section": "Configuration", "explanation": "Pinned Classes in CI Class Manager allow administrators or CI c lass owners to pin frequently managed classes so they appear quickly in the interface. This makes it easier to access and manage commonly used classes such as the Windows Server class without searching through the entire class hierarchy.", "multi": false}, {"num": 37, "question": "The Change Management team in an organization wants to implemen t a Change across multiple CIs at the same time. Which field on the Change Request form needs to be populated wi th a dynamic CI group?", "options": {"A": "Configuration Item", "B": "Business Service", "C": "Service Offering"}, "answer": "A", "section": "Configuration", "explanation": "The Configuration Item field on the Change Request form support s referencing a Dynamic CI Group. When a dynamic group is selected in this field, the platform ex pands the group and automatically populates the associated configuration items into the Affected CIs related list, enabling the change to apply across multiple CIs simultaneously.", "multi": false}, {"num": 38, "question": "A CMDB Administrator needs to configure a new application ident ification rule that considers the potential for the same application installed more than once on the same s erver. Which is the best choice of a criterion attribute?", "options": {"A": "Version", "B": "Configuration File Name", "C": "Port", "D": "Configuration File Path", "E": "Class"}, "answer": "D", "section": "Configuration", "explanation": "The Configuration File Path uniquely identifies the location of an application instance on a server. When the same application can be installed multiple times on the sam e host, the installation path distinguishes each instance, making it an effective attribute for identificat ion rules used by the Identification and Reconciliation Engine.", "multi": false}, {"num": 39, "question": "The CMDB Administrator has set-up two Dynamic Reconcilliation R ules within the ServiceNow Production Instance. The ‘Server’ class has a Dynamic Reconciliation Rule of largest value for the RAM field. The ‘Windows Server’ class has a Dynamic Reconciliation Rule of mos t reported for the RAM field. Given the above data in the Multisource CMDB, which value would be added to the CMDB for RAM for a ‘Server’ CI?", "options": {"A": "4.096 MB", "B": "8.192 MB", "C": "2.048 MB"}, "answer": "B", "section": "Ingest", "explanation": "For a CI in the Server class, the applicable dynamic reconcilia tion rule is “largest value” for the RAM field. Among the reported values (4.096, 4.096, 2.048, and 8.192), the largest is 8.192 MB, so that value is written to the CMDB.", "multi": false}, {"num": 40, "question": "A CMDB Administrator needs to import external data into the CMD B. As the CMDB Administrator wants to reduce the risk for creating duplicates and to update informati on from unauthorized sources, it has to be ensured that the Identification and Reconciliation API will not be bypassed. What is the recommended method to import data into the CMDB uti lizing the Identification and Reconciliation API?", "options": {"A": "IntegrationHub ETL", "B": "Table API (REST API or SOAP API)", "C": "Import Sets and Transform Maps"}, "answer": "A", "section": "Ingest", "explanation": "IntegrationHub ETL is designed to load external data into the C MDB through the Identification and Reconciliation Engine, ensuring proper CI identification and go vernance so that duplicate creation is minimized and unauthorized updates are prevented.", "multi": false}, {"num": 41, "question": "A Configuration Manager has configured a multiple data sources which are all authorized to update the same class and the same set of class attributes in the CMDB. What can the Configuration Manager do to control which data sou rce should be authoritative source of truth for a specific class of set of class attributes?", "options": {"A": "Assign a priority to each data source in the reconciliation r ules", "B": "Manually run the data source updates in the correct order", "C": "Configure data refresh rules with a specific time period", "D": "Assign a run order to each data source in the identification rules"}, "answer": "A", "section": "Ingest", "explanation": "Reconciliation rules allow the Configuration Manager to assign precedence to authorized data sources for specific classes and attributes, ensuring that the designated a uthoritative source updates the CMDB when multiple sources provide data.", "multi": false}, {"num": 42, "question": "Which CMDB 360/Multisource CMDB the Dynamic Reconciliation Rule s will also be enabled. Based on the request of the management, a CMDB Administrator has to set up m ultiple Dynamic Reconciliation Rules. Which are available ‘Dynamic Rule Types’ within the ‘Create Rec onciliation Rule’ wizard? (Choose two.)", "options": {"A": "Last Updated", "B": "Smallest Value", "C": "Last Created", "D": "Most Reported"}, "answer": "BD", "section": "Ingest", "explanation": "Dynamic Reconciliation Rules support selecting attribute values based on data comparison logic such as choosing the smallest reported value or the most frequently rep orted value across multiple authorized data sources.", "multi": true}, {"num": 43, "question": "The following identification rule for a CI class has been defin ed: Two new CI records are imported into the hardware class of the CMDB: CI1: The name of this CI record matches the name of an existing CI record in the CMDB. CI2: The IP address of this CI record matches the IP address of an existing CI record in the CMDB. Which is correct based on the identification rule and the impor ted CI records?", "options": {"A": "CI1 will be inserted as new record and CI2 will be updated wi th matching record.", "B": "CI1 will be updated with matching record and CI2 will be inse rted as new record.", "C": "CI1 and CI2 both will be updated with matching records.", "D": "CI1 and CI2 both will be inserted as new records."}, "answer": "B", "section": "Ingest", "explanation": "The identification rule includes name as a matching criterion f or the hardware class, so a matching name causes the existing CI to be updated. Since IP address is not d efined as an identification attribute in the rule, a match on IP address does not trigger identification and results in a new CI being inserted.", "multi": false}, {"num": 44, "question": "A customer wants recently imported server records to be automat ically reclassified into more specific CMDB classes after being discovered using ServiceNow Discovery. During the discovery process, if existing Server [cmdb_ci_serve r] records are reclassified into the Linux [cmdb_ci_linux_server] and Windows Server [cmdb_ci_win_server] classes, which reclassification operation occurred?", "options": {"A": "Class Upgrade", "B": "Class Downgrade", "C": "Class Switch"}, "answer": "A", "section": "Ingest", "explanation": "Reclassifying records from the generic Server class into more s pecific child classes such as Linux Server or Windows Server represents a move to a more specialized class ification within the class hierarchy.", "multi": false}, {"num": 45, "question": "A Platform Data Owner wants to improve data quality with a few reconciliation rules across the five discovery sources that are being used. The Data Owner knows the best option is to include CMDB 360/ Multisource CMDB to manage and monitor discovery sources, but t he company currently does not have a license for ITOM Discovery that is required for CMDB 360/Multis ource CMDB. What can the Data Owner do in this case?", "options": {"A": "ITOM Discovery needs to be purchased to take advantage of the multisource IRE Rules.", "B": "CMBD 360/Multisource is a platform product that can be used i mmediately.", "C": "The IRE reconciliation rules can use discovery source regardl ess of CMDB 360 being enabled."}, "answer": "C", "section": "Ingest", "explanation": "IRE reconciliation rules can be configured to use the discovery source attribute to control data authority across multiple inputs without requiring CMDB 360 or ITOM Disco very licensing.", "multi": false}, {"num": 46, "question": "Which ServiceNow solution creates automatic relationships?", "options": {"A": "IntegrationHub ETL", "B": "Discovery", "C": "Workflow Studio", "D": "Service Mapping"}, "answer": "D", "section": "Ingest", "explanation": "Service Mapping automatically identifies and creates relationsh ips between configuration items based on application traffic and dependencies to build accurate service topology maps.", "multi": false}, {"num": 47, "question": "The Apache Web Server Identification Rule is configured with th e following Criterion attributes: Class Configuration file Version Yesterday, an Apache Web Server CI was discovered as part of Se rvice Mapping. Today, the application owner upgraded Apache to a different version and reran discover y of the service. What will happen in the CMDB?", "options": {"A": "The existing Apache Web Server CI will be reconciled and its version will be updated.", "B": "A duplication error will occur.", "C": "The Apache Web Server CI will be reclassified as a Web Server CI.", "D": "A new Apache Web Server CI is created."}, "answer": "D", "section": "Ingest", "explanation": "Because Version is part of the identification criteria, the upd ated version no longer matches the existing CI’s identifier values, so the Identification and Reconciliatio n Engine treats it as a different configuration item and creates a new CI.", "multi": false}, {"num": 48, "question": "Configuration Management requires an accurate inventory of devi ces to be reflected in the CMDB. Which are common use cases for using Agent Client Collector (AC C)? (Choose two.)", "options": {"A": "Network devices in the DMZ", "B": "Devices that intermittently connect to the network", "C": "Servers in the data center", "D": "Devices in secure environments"}, "answer": "BD", "section": "Ingest", "explanation": "Agent Client Collector is suited for devices that are not consi stently reachable by network-based discovery and for endpoints operating in restricted or highly secure envi ronments where traditional scanning methods are not feasible.", "multi": true}, {"num": 49, "question": "An organization needs to maintain non-discoverable attributes, such as warranty expiration dates, for hardware CIs. These attributes are not updated by automated dis covery tools. What method ensures these attributes are accurately maintained for all CIs?", "options": {"A": "Create a new CI class specifically for non-discoverable attri butes", "B": "Use the CMDB Reconciliation Engine to update the attributes", "C": "Use a scheduled data import to update the attributes from an external source"}, "answer": "C", "section": "Ingest", "explanation": "A scheduled data import from an authoritative external source e nsures that non-discoverable attributes such as warranty expiration dates are consistently updated acro ss hardware configuration items through governed ingestion processes.", "multi": false}, {"num": 51, "question": "When integrating data into the CMDB using import sets and trans form maps, which type of script is added to ensure the data is processed through the IRE?", "options": {"A": "onBefore", "B": "onComplete", "C": "onStart", "D": "onAfter"}, "answer": "A", "section": "Ingest", "explanation": "An onBefore transform script is used to invoke the Identificati on and Reconciliation Engine so that incoming data is identified and reconciled before it is written to the CMDB.", "multi": false}, {"num": 52, "question": "The following Reconciliation Rules were configured for ServiceN ow, Altiris, and SCCM: Which are true? (Choose two.)", "options": {"A": "Data collected with a discovery source of SCCM can update any record in the Windows Server [cmdb_ci_win_server] table because it has the highest priority number.", "B": "Data collected with a discovery source of ServiceNow can inse rt new records into the Windows Server [cmdb_ci_win_server] table, but cannot update records created b y Altiris or SCCM.", "C": "Data collected with a discovery source of Altiris can update records inserted by SCCM into the Windows Server [cmdb_ci_win_server] table.", "D": "Data collected with a discovery source of SCCM can be inserte d as new records in the Windows Server [cmdb_ci_win_server] table."}, "answer": "BD", "section": "Ingest", "explanation": "A higher-priority data source cannot overwrite data from a lowe r-priority source, so ServiceNow cannot update records created by Altiris or SCCM. SCCM is still author ized to insert new records into the Windows Server class based on reconciliation authorization.", "multi": true}, {"num": 53, "question": "A CMDB Administrator has installed a Service Graph Connector an d customized a script transform. What will happen on subsequent upgrades if the default definiti on of the script transform is updated?", "options": {"A": "A skipped change is created and no change is made the script transform definition.", "B": "The Service Graph Connector upgrade refuses to start.", "C": "The upgrade stops and reports an error."}, "answer": "A", "section": "Ingest", "explanation": "When a customized script transform differs from the updated def ault during an upgrade, the platform preserves the customization and records the update as a skipped change without modifying the existing definition.", "multi": false}, {"num": 54, "question": "A Windows server is reclassified from the Server table [cmdb_ci _server] to the Windows Server table [cmdb_ci_win_server] when processed through the Identification and Reconciliation Engine (IRE). Which process occurred?", "options": {"A": "Class Change", "B": "Class Switch", "C": "Class Downgrade", "D": "Class Upgrade"}, "answer": "D", "section": "Ingest", "explanation": "A class upgrade occurs when a configuration item is reclassifie d from a parent class to a more specific child class within the CMDB hierarchy. When the Identification and Reconciliation Engine processes the record and moves it from the generic Server class to the more s pecific Windows Server class, the CI is upgraded to a more detailed classification that better represen ts the actual asset.", "multi": false}, {"num": 56, "question": "An organization utilizes multiple data sources to update its CM DB, each assigned a different priority level. A high-priority data source is scheduled to update server recor ds weekly. However, due to an integration issue, the high-priority data source stops updating the records . Which configuration can be used to allow a lower-priority data source to update records after a specified period of inactivity from the higher-priority source?", "options": {"A": "Data Refresh Rules", "B": "Reconciliation Rules", "C": "Health Inclusion Rules", "D": "Identification Rules"}, "answer": "A", "section": "Ingest", "explanation": "Data Refresh Rules allow the CMDB to override reconciliation so urce priority when a higher-priority data source has not updated a CI attribute within a defined time per iod. If the preferred source becomes inactive, the rule permits a lower-priority data source to upda te the CI after the specified inactivity window, ensuring that CMDB data remains current even when the primary i ntegration stops sending updates.", "multi": false}, {"num": 57, "question": "A CMDB Administrator has imported data into the ServiceNow CMDB from a third-party source using a Service Graph Connector. The Administrator wants to review spec ific field to field mappings for the import. Which feature will show that information?", "options": {"A": "Integration Hub", "B": "IntegrationHub ETL", "C": "CMDB Integrations Dashboard"}, "answer": "B", "section": "Ingest", "explanation": "IntegrationHub ETL provides the data transformation framework u sed by Service Graph Connectors to ingest external data into the CMDB. It includes mapping definit ions that show how fields from the source system are transformed and mapped to CMDB attributes, allowing administrators to review the exact field- to-field mappings used during the import process.", "multi": false}, {"num": 58, "question": "What are the characteristics or functions of ServiceNow Integra tionHub ETL? (Choose two.)", "options": {"A": "Integrates third-party data into the CMDB or into non-CM DB t ables", "B": "Uses the IRE to process and integrate data", "C": "Imports Microsoft SCCM/Intune data into the CMDB", "D": "Performs discovery data collection and updates the CMDB"}, "answer": "AB", "section": "Ingest", "explanation": "IntegrationHub ETL is used to ingest and transform data from ex ternal systems into ServiceNow, allowing third-party data to be integrated into the CMDB or other platfo rm tables. During the ingestion process, it leverages the Identification and Reconciliation Engine to corre ctly identify configuration items and reconcile attributes according to CMDB rules, ensuring consiste nt and deduplicated data integration.", "multi": true}, {"num": 59, "question": "A CMDB Administrator needs to ingest relevant data from Microso ft SCCM into the CMDB. Which ingestion method brings the fastest time to value?", "options": {"A": "Import Sets", "B": "Service Graph Connectors", "C": "Agent Client Collector", "D": "IntegrationHub ETL"}, "answer": "B", "section": "Ingest", "explanation": "Service Graph Connectors provide prebuilt, standardized integra tions for common external systems such as Microsoft SCCM. They use the Service Graph framework and Int egrationHub ETL with built-in mappings and Identification and Reconciliation Engine processin g, allowing organizations to quickly ingest normalized data into the CMDB with minimal configuration and th e fastest time to value.", "multi": false}, {"num": 60, "question": "A CMDB Administrator changes the query for the SCCM Service Gra ph Connector. What is the impact of this change?", "options": {"A": "Any Scheduled Jobs for the SCCM Service Graph Connector will need to be configured.", "B": "Any updates for the SCCM Service Graph Connector will be skip ped during the upgrade.", "C": "The Data Source for the SCCM Service Graph Connector will be marked as Inactive."}, "answer": "B", "section": "Ingest", "explanation": "When the query of a Service Graph Connector such as the SCCM co nnector is modified, the connector configuration becomes customized. During future upgrades, Servi ceNow preserves customer customizations by skipping updates to those modified components , ensuring that the customized query is not overwritten by the upgrade process.", "multi": false}, {"num": 61, "question": "A CMDB Administrator needs to prevent duplicate CI creation fro m import sets that load data into the CMDB from vendor shipment files containing CI information. How can the Administrator do this?", "options": {"A": "Set the coalesce on two mappings within the transform map", "B": "Create comparison rules in the IRE", "C": "Set the system property to utilize the IRE within transform m aps", "D": "Use the CMDBTransformUtil API in the transform script"}, "answer": "D", "section": "Ingest", "explanation": "Using the CMDBTransformUtil API in the transform script ensures that data from import sets is processed through the Identification and Reconciliation Engine. This allo ws the CMDB to apply identification rules to determine whether a configuration item already exists and updat e it instead of creating duplicates, preventing duplicate CI records during imports.", "multi": false}, {"num": 62, "question": "A ServiceNow Administrator wants to implement Service Graph Con nectors to provide integrations to many third-party solutions that the company wants integrated in to the CMDB. Which categories of connectors are available to the Administrat or? (Choose two.)", "options": {"A": "DevOps", "B": "Cloud", "C": "Workflow Automation", "D": "Observability"}, "answer": "BD", "section": "Ingest", "explanation": "Service Graph Connectors include predefined integrations catego rized by technology domains that commonly provide infrastructure and configuration data to the C MDB. Cloud connectors integrate cloud platforms to ingest infrastructure and service data, while Obse rvability connectors integrate monitoring and observability tools to import infrastructure and application co nfiguration information into the CMDB.", "multi": true}, {"num": 63, "question": "The Server [cmdb_ci_server] class uses a dynamic reconciliation rule of lowest value for the Disk Space (GB) field, while the Windows Server [cmdb_ci_win_server] class uses a dynamic reconciliation rule of most reported for the Disk Space (GB) field. Given the following data sources that populate Windows Server d ata into the CMDB 360/Multisource CMDB: Which value would be added to the CMDB for the Disk Space (GB) field of a Windows Server [cmdb_ci_win_server] record?", "options": {"A": "80", "B": "75", "C": "50"}, "answer": "B", "section": "Ingest", "explanation": "Reconciliation rules applied at the more specific class level o verride rules defined on parent classes. Since the Windows Server class defines the rule for Disk Space as mos t reported, the value that appears most frequently among the data sources is selected. In the provided data, 75 GB is reported twice, making it the most frequently reported value, so it becomes the reconciled va lue stored in the CMDB.", "multi": false}, {"num": 64, "question": "A Configuration Manager needs to ingest third-party CIs into th e CMDB. Which method minimizes the risk of technical debt?", "options": {"A": "Vendor-provided integration", "B": "Table API", "C": "Service Graph Connector", "D": "Import Sets and Transform Maps"}, "answer": "C", "section": "Ingest", "explanation": "Service Graph Connectors provide standardized, supported integr ations designed specifically for ingesting third-party configuration data into the CMDB. They use the Serv ice Graph framework, IntegrationHub ETL, and the Identification and Reconciliation Engine to normalize a nd reconcile data according to CMDB best practices. This approach minimizes custom development and there fore reduces the risk of long-term technical debt.", "multi": false}, {"num": 65, "question": "Which ServiceNow solutions automatically create relationships b etween CI Applications that are part of an Application Service? (Choose two.)", "options": {"A": "IntegrationHub ETL", "B": "Event Management", "C": "Discovery", "D": "Service Mapping", "E": "Data Manager"}, "answer": "CD", "section": "Ingest", "explanation": "Discovery automatically identifies infrastructure and applicati on components in the environment and creates relationships between them as it populates the CMDB. Se rvice Mapping builds detailed application service topologies by discovering and mapping dependencies betw een applications and the infrastructure components that support them, automatically creating the relati onships within the CMDB.", "multi": true}, ut an approval record attached to the affected mapping record.", "C": "The customized mappings are not supported by ServiceNow, and the customer is responsible for supporting their own customized SGC."}, "answer": "C", "section": "Ingest", "explanation": "When mappings in a Service Graph Connector are customized, they become customer-managed configurations. These customizations are no longer covered by S erviceNow support for the out-of-box connector content, meaning the customer is responsible for main taining and supporting those customized mappings.", "multi": false}, {"num": 69, "question": "A CMDB Data Owner has requested belter insights on the differen t data sources that make up the CMDB data set. The Platform Owner knows that the new Service Graph C onnector Central plugin is just what is needed. After installing the plugin, what workspace will have the new S ervice Graph Connector Central tab available?", "options": {"A": "Discovery Admin Workspace", "B": "CMDB Workspace", "C": "Service Graph Connector Workspace"}, "answer": "B", "section": "Ingest", "explanation": "After installing the Service Graph Connector Central plugin, th e Service Graph Connector Central tab becomes available in the CMDB Workspace. This workspace provide s centralized visibility and management for CMDB data ingestion, including connectors, data sources, and related insights.", "multi": false}, {"num": 70, "question": "A CMDB Administrator would like to minimize stale CIs in the CM DB. Which CMDB Health Dashboard scorecard displays this information ?", "options": {"A": "Correctness", "B": "Compliance", "C": "Completeness"}, "answer": "B", "section": "Govern", "explanation": "The Compliance scorecard measures how well configuration items adhere to defined CMDB lifecycle and governance policies, including identifying stale CIs that have not been updated within expected timeframes. This helps ensure data remains current and aligned with governance standards.", "multi": false}, {"num": 7
