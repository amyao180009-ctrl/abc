rue}, {"num": 80, "question": "A CMDB Configuration Manager is reviewing the metrics on the CM DB Health Dashboard’s Correctness Scorecard for the Server class which consists of a total of 60, 000 servers in the CMDB. For the Duplicate metric, it shows Healthy CIs/Evaluated as 59, 000/60,000. For the Orphan metric, it shows Healthy CIs/Evaluated as 45,000 /50,000. Which configuration explains the difference in the scope of Ser ver CIs (60,000 vs.50,000) evaluated between the two metrics?", "options": {"A": "The Duplicate metric has a CMDB Group configured for the Serv er class.", "B": "The Duplicate metric has a Health Inclusion rule configured f or the Server class.", "C": "The Orphan metric has a Health Inclusion rule configured for the Server class.", "D": "The Orphan metric has a CMDB Group configured for the Server class."}, "answer": "C", "section": "Govern", "explanation": "A Health Inclusion rule limits which configuration items are ev aluated by a specific health metric, so applying it to the Orphan metric reduces the number of Server C Is included in its evaluation scope compared to the total population.", "multi": false}, {"num": 81, "question": "CMDB class owners are receiving tasks under the ‘My Work’ tab i n the CMDB Workspace. Which CMDB management tool is generating these tasks?", "options": {"A": "CMDB Data Manager", "B": "De-duplication templates", "C": "CMDB Health Dashboard"}, "answer": "C", "section": "Govern", "explanation": "The CMDB Health Dashboard generates remediation tasks for class owners to address data quality issues such as completeness, correctness, and compliance, which appear in the My Work tab of the CMDB Workspace.", "multi": false}, {"num": 82, "question": "What ensures data volume in the CMDB manageable?", "options": {"A": "Scheduled Jobs", "B": "Archive Policies", "C": "Business Rules"}, "answer": "B", "section": "Govern", "explanation": "Archive policies manage CMDB data volume by systematically arch iving or removing configuration items that meet defined lifecycle or inactivity criteria, keeping the dataset maintainable over time.", "multi": false}, {"num": 83, "question": "A CMDB Manager wants to improve data quality using the CMDB Hea lth Dashboard. What needs to happen to generate CMDB health scores?", "options": {"A": "Nothing, CMDB health scores are calculated by default", "B": "The plugin, CMDB health calculation, needs to be installed", "C": "The scheduled jobs for the CMDB Health Dashboard must be acti vated"}, "answer": "C", "section": "Govern", "explanation": "CMDB health scores are generated by background calculations tha t run through scheduled jobs, which must be active to evaluate configuration items and update dashb oard metrics.", "multi": false}, {"num": 84, "question": "The CMDB Configuration Manager is using the CI Class Manager to manage the group ownership of CI classes and needs to leverage the ownership value specified in the CI Class Manager. When configuring a CMDB Data Manager policy, which group refere nce field should be set?", "options": {"A": "Change Group", "B": "Approval Group", "C": "Managed By Group", "D": "Support Group"}, "answer": "C", "section": "Govern", "explanation": "The Managed By Group defined in the CI Class Manager represents the ownership of the CI class and is used by CMDB Data Manager policies to apply governance actions based on class ownership.", "multi": false}, {"num": 85, "question": "The CMDB Configuration Management team wants to manage de-dupli cation tasks generated from data ingested into the CMDB via the Identification and Reconciliatio n Engine (IRE). In which area of the CMDB Workspace can they locate these de-du plication tasks?", "options": {"A": "Important actions tile under the Home tab", "B": "CMDB feature adoption tile under the Insight tab", "C": "Total status tile under the My Work tab"}, "answer": "C", "section": "Govern", "explanation": "De-duplication tasks generated by the Identification and Reconc iliation Engine are assigned to users and appear in the My Work tab, where task status is tracked in the Total status tile for remediation.", "multi": false}, {"num": 86, "question": "Which type of CMDB Data Manager policy creates tasks that allow the assigned individual to update fields on the CI record?", "options": {"A": "Compliance", "B": "Certification", "C": "Attestation", "D": "Audit"}, "answer": "B", "section": "Govern", "explanation": "Certification policies generate tasks that require assigned use rs to review and update specific CI attributes to ensure data accuracy and completeness.", "multi": false}, {"num": 89, "question": "A Configuration Manager needs to leverage a policy type to auto mate the creation and assignment of tasks to validate the existence of CIs. Which policy type should be used to accomplish this goal?", "options": {"A": "Retire", "B": "Certification", "C": "Delete", "D": "Attestation"}, "answer": "D", "section": "Govern", "explanation": "Attestation policies generate tasks that require assigned users to confirm that configuration items still exist and remain valid in the environment.", "multi": false}, {"num": 90, "question": "Which is a purpose or requirement of CMDB Data Manager in Servi ceNow?", "options": {"A": "Encrypts archived records for enhanced security", "B": "Automates the enforcement of relationship rules between CIs i n the CMDB", "C": "Automates the archival and deletion of records based on reten tion policies"}, "answer": "C", "section": "Govern", "explanation": "CMDB Data Manager automates lifecycle management by archiving a nd deleting configuration item records according to defined retention and governance policies.", "multi": false}, {"num": 91, "question": "A CMDB Data Manager needs to access the ServiceNow platform to create, publish, and manage policies that automate and govern CI lifecycle operations, ensuring the CMDB remains healthy and efficient. Where can the Data Manager do this?", "options": {"A": "CMDB Workspace Management tab", "B": "Service Operations Workspace", "C": "CMDB Workspace CMDB 360 tab", "D": "CI Class Manager"}, "answer": "A", "section": "Govern", "explanation": "The Management tab in CMDB Workspace provides access to CMDB Da ta Manager for creating, publishing, and managing lifecycle governance policies for conf iguration items.", "multi": false}, {"num": 92, "question": "A CMDB Administrator wants to ensure all short-lived CIs that h ave not been discovered in the past week are removed. After retiring the CI records, which recommended action does th e CMDB Administrator take?", "options": {"A": "Create a delete police", "B": "Create a business rule", "C": "Create a scheduled job"}, "answer": "C", "section": "Govern", "explanation": "A scheduled job is used to automate periodic maintenance tasks in the CMDB. After configuration items are retired, a scheduled job can run regularly to identify and delete short-lived CIs that have not been discovered within the defined timeframe, ensuring the CMDB rema ins clean and accurate without requiring manual intervention.", "multi": false}, {"num": 93, "question": "A CMDB Administrator has taken over management of a ServiceNow instance and has determined there are multiple deficiencies in the CMDB. During review of the CMD B Data Foundations Dashboard, the Administrator sees that ServiceNow offers Remediation Playbooks . How can Playbooks assist the Administrator in resolving these i ssues?", "options": {"A": "Playbooks can be installed in the instance to automatically f ix issues.", "B": "Playbooks can help analyze and fix issues.", "C": "Playbooks can automatically track common CMDB issues and outp ut metrics."}, "answer": "B", "section": "Govern", "explanation": "Remediation Playbooks provide guided procedures that help admin istrators investigate and resolve CMDB data quality issues identified in the Data Foundations Dashboar d. They include analysis steps, best- practice guidance, and actions to remediate problems such as du plicates, incomplete records, or identification issues, enabling administrators to systematicall y diagnose and correct CMDB deficiencies.", "multi": false}, {"num": 94, "question": "A CMDB Administrator utilizing the CMDB Data Foundations Dashbo ard sees an issue and wants to run a playbook. Which types of documentation can they expect to be provided in a playbook? (Choose two.)", "options": {"A": "Root Cause", "B": "Automated Remediations", "C": "Problem Analysis", "D": "Problem Overview"}, "answer": "CD", "section": "Govern", "explanation": "Playbooks provide structured documentation that helps administr ators understand and resolve CMDB data quality issues. They include a problem overview to describe the issue and its impact on the CMDB, and a problem analysis section that guides administrators through ide ntifying the cause and determining appropriate remediation steps.", "multi": true}, {"num": 95, "question": "A CMDB Administrator is considering whether to start using the playbooks provided on the CMDB Data Foundation Dashboard. What are the benefits to support the decision to leverage this feature? (Choose two.)", "options": {"A": "Offers automated scripts to resolve poorly performing metrics", "B": "Offers insight into the downstream impacts of poorly performi ng metrics", "C": "Offers remediation options to address and improve poorly perf orming metrics", "D": "Offers remediation templates to improve poorly performing met rics"}, "answer": "BC", "section": "Govern", "explanation": "Playbooks provide guidance that helps administrators understand how poorly performing CMDB metrics affect downstream processes and service management outcomes. Th ey also present recommended remediation actions and best-practice steps to address and impr ove those metrics, helping organizations systematically improve CMDB data quality and governance.", "multi": true}, {"num": 96, "question": "A CMDB Administrator is beginning the journey of populating the CMDB and needs to verify that any data which is no longer useful/applicable is removed. Which governance management tool will accomplish this?", "options": {"A": "CI Class Manager", "B": "CMDB and CSDM Data Foundations Dashboard", "C": "CMDB Data Manager", "D": "De-duplication Templates", "E": "CMDB Health Dashboard"}, "answer": "C", "section": "Govern", "explanation": "CMDB Data Manager is used to manage the lifecycle of configurat ion item records, including identifying and removing stale or obsolete data. It allows administrators t o define policies and automated actions to archive or delete configuration items that are no longer releva nt, ensuring the CMDB remains accurate and properly maintained over time.", "multi": false}, {"num": 97, "question": "The CMDB Administrator wants to leverage the Staleness metric f rom the CMDB Health Dashboard - Correctness Scorecard. Which field is used to calculate the duration of this metric?", "options": {"A": "Updated (sys_updated_on)", "B": "Created (sys_created_on)", "C": "Last modified on (last_modified)", "D": "Most recent discovery (last_discovery)", "E": "First discovered (first_discovered)"}, "answer": "D", "section": "Govern", "explanation": "The Staleness metric on the CMDB Health Dashboard measures how recently a configuration item has been updated through discovery. The duration is calculated usin g the Most recent discovery field, which records the last time the CI was identified or updated by a dis covery process. This allows the dashboard to determine whether the CI data is current or stale based on how long it has been since the last discovery update.", "multi": false}, {"num": 99, "question": "Using existing baseline Data Manager policies, what condition m ust a CI meet before it can be archived or deleted?", "options": {"A": "Be fully operational and in use", "B": "Be marked as critical", "C": "Be retired and in end of life", "D": "Be marked as inactive"}, "answer": "C", "section": "Govern", "explanation": "Baseline CMDB Data Manager lifecycle policies archive or delete configuration items only after they have reached the end of their lifecycle. A CI must first be retired and in an end-of-life state before lifecycle policies allow archival or deletion, ensuring that active or op erational configuration items are not accidentally removed from the CMDB.", "multi": false}, {"num": 100, "question": "The Configuration Management team wants to confirm that all ser vers in the CMDB actually exist in the data center. Which CMDB Data Manager policy type would the team create?", "options": {"A": "Attestation", "B": "Retire", "C": "Delete", "D": "Archive", "E": "Certification"}, "answer": "A", "section": "Govern", "explanation": "Attestation policies require designated owners or responsible u sers to periodically confirm that configuration items are still valid and exist in the environmen t. This process helps validate the accuracy of CMDB records, such as confirming that servers listed in the CMD B actually exist in the data center.", "multi": false}, {"num": 103, "question": "How do CMDB management tools and features within the CMDB gover nance pillar help organizations manage CIs and improve service delivery? (Choose two.)", "options": {"A": "Reduced hardware costs", "B": "Gain visibility and control", "C": "Assist integration choices", "D": "Enhanced Service Management operations"}, "answer": "BD", "section": "Govern", "explanation": "CMDB governance tools provide visibility into configuration ite ms, their data quality, and their relationships, enabling organizations to maintain better control over the CMDB environment. This improved visibility and governance supports more effective service management operation s by ensuring that accurate and trusted configuration data is available for processes such as incident, problem, and change management.", "multi": true}, {"num": 104, "question": "What types of policies can be created within CMDB Data Manager? (Choose two.)", "options": {"A": "Retire", "B": "Reconciliation", "C": "De-duplication", "D": "Archive"}, "answer": "AD", "section": "Govern", "explanation": "CMDB Data Manager provides lifecycle management policies that a utomate the handling of configuration items as they age. Retire policies transition configuration ite ms out of active use when they meet defined conditions, and Archive policies move retired records to archiv al storage so that obsolete data is removed from active CMDB operations while still being retained if neede d for reference.", "multi": true}, {"num": 105, "question": "Which default user groups are available when setting up a CMDB Data Manager policy and specifying the task assignment with the Assignment type set to 'User Group Fie ld'? (Choose two.)", "options": {"A": "Owned by Group", "B": "Assignment Group", "C": "Managed By Group", "D": "Support Group"}, "answer": "BD", "section": "Govern", "explanation": "When configuring a CMDB Data Manager policy with the assignment type set to User Group Field, the platform allows tasks to be routed based on specific group refe rence fields on the CI record. The default group fields available for this purpose are Assignment Group an d Support Group, which commonly represent the teams responsible for managing or supporting the configuration item.", "multi": true}, {"num": 106, "question": "During a CMDB implementation, a team member is tasked with ensu ring the accuracy and completeness of CI data. This person is also responsible for maintaining dat a quality and resolving discrepancies. Which role is responsible for these tasks?", "options": {"A": "CMDB Architect", "B": "IT Asset Manager", "C": "Configuration Manager", "D": "Service Owner"}, "answer": "C", "section": "Govern", "explanation": "The Configuration Manager is responsible for maintaining the in tegrity and quality of CMDB data. This role oversees configuration management processes, ensures configurat ion item data is accurate and complete, and resolves discrepancies to maintain a reliable and trusted C MDB.", "multi": false}, {"num": 107, "question": "A CMDB Configuration Manager sets up the following data filter for a certification policy using CMDB Data Manager. ● Table: Server [cmdb_ci_server] ● Filter: Operating System | cont ains | Server OR Operating Sy stem | contains | Linux Which operating systems are affected by this policy? (Choose tw o.)", "options": {"A": "Linux CentOS", "B": "AIX", "C": "Windows Server 2022 Datacenter", "D": "Windows 2019 Datacenter"}, "answer": "AC", "section": "Govern", "explanation": "The filter targets records where the Operating System field con tains either “Server” or “Linux.” Linux CentOS matches because the value contains the word “Linux.” Win dows Server 2022 Datacenter matches because the value contains the word “Server.”", "multi": true}, {"num": 108, "question": "A CMDB Administrator needs to track which CIs and CI classes ar e missing key data. Which CMDB Health Dashboard scorecard supports tracking this re quirement?", "options": {"A": "Correctness", "B": "Completeness", "C": "Compliance"}, "answer": "B", "section": "Govern", "explanation": "The Completeness scorecard measures whether required or recomme nded attributes for configuration items are populated. It identifies CIs and CI classes that are missing key data fields, allowing administrators to track and improve the completeness of CMDB re cords.", "multi": false}, {"num": 109, "question": "A CMDB Administrator has a number of similar de-duplication tas ks that need to be remediated in bulk. How does the Administrator achieve this?", "options": {"A": "Utilize the Duplicate CI Remediator Wizard", "B": "Configure and run a custom de-duplication background script", "C": "Create de-duplication tasks manually and remediate each", "D": "Create and run a de-duplication template"}, "answer": "D", "section": "Govern", "explanation": "De-duplication templates allow administrators to remediate dupl icate configuration items in bulk by defining rules and actions that apply to multiple duplicate records. The template can be executed to process many duplicate CIs at once, streamlining large-scale remediation ins tead of handling each task individually.", "multi": false}, {"num": 110, "question": "A CMDB Administrator group aims to establish a process for rece iving task notifications when the Support Group or Managed By Group fields are not populated for operatio nal Linux servers stored in the CMDB. Which ServiceNow modules can be leveraged to configure recommen ded fields and generate task records in cases where these fields are missing for Linux servers in th e CMDB?", "options": {"A": "CMDB Workspace and Scheduled Jobs", "B": "Technical Service Offerings and Dynamic CI groups", "C": "Dynamic CI groups and CMDB groups", "D": "CI Class Manager and Health Preferences"}, "answer": "D", "section": "Govern", "explanation": "CI Class Manager is used to configure recommended fields for CI classes, allowing administrators to define which attributes should be populated for records such as Linux servers. Health Preferences are then used by the CMDB Health framework to monitor these recomme nded fields and generate remediation tasks when the required or recommended attributes, such as Supp ort Group or Managed By Group, are missing.", "multi": false}, {"num": 111, "question": "A CMDB Administrator has a report in ServiceNow that lists all CMDB Services that do not have an owner and wants to use a ServiceNow Playbook. What Governance process play can prevent this from recurring?", "options": {"A": "Set a default value on the Service Owner field so that is nev er empty", "B": "Make the field Owned by mandatory", "C": "Make the field Managed by mandatory on all CIs"}, "answer": "B", "section": "Govern", "explanation": "Making the Owned by field mandatory ensures that every CMDB ser vice record must have an assigned owner before it can be created or updated. This governance cont rol prevents services from existing without clear accountability, which addresses the root cause of services appearing in reports without owners.", "multi": false}, {"num": 112, "question": "A CMDB Administrator wants to leverage the Staleness metric fro m the CMDB Health Dashboard - Correctness Scorecard. What is the default duration of this metric?", "options": {"A": "30 days", "B": "24 hours", "C": "7 days", "D": "60 days"}, "answer": "A", "section": "Govern", "explanation": "The default staleness threshold used by the CMDB Health Dashboa rd Correctness scorecard is 30 days. A configuration item is considered stale if it has not been upd ated by discovery within this time period, indicating that the CI data may no longer accurately represent the current environment.", "multi": false}, {"num": 113, "question": "A Configuration Manager responsible for a specific region wants to use the CMDB Health Dashboard to improve the data quality of the CMDB for that region. The Confi guration Manager only sees the overall score and grouped by CI Class. How can the Configuration Manager get a score for regionally re levant CIs?", "options": {"A": "On the CMDB health settings, activate the option, Group score s by region", "B": "Customize the CMDB Health Dashboard scheduled jobs to group t he results by region", "C": "Create CMDB groups with type, health, by region"}, "answer": "C", "section": "Govern", "explanation": "CMDB groups with the type set to Health allow administrators to scope CMDB Health metrics to specific subsets of configuration items. By creating groups based on reg ional criteria, the Configuration Manager can generate health scores that reflect only the CIs belonging to that region, enabling more targeted monitoring and improvement of data quality.", "multi": false}, {"num": 114, "question": "How does a CMDB Administrator use the ServiceNow Platform to en sure the data quality associated with CIs in the CMDB?", "options": {"A": "Data Quality Scheduled Job", "B": "CMDB Audit Business Rule", "C": "CMDB Workspace", "D": "Data Quality Business Rule"}, "answer": "D", "section": "Govern", "explanation": "The Data Quality Business Rule enforces validation logic on con figuration item records to ensure that required or recommended data is present and meets defined stand ards. It helps maintain CMDB data quality by preventing records from being saved when they do not meet the defined data quality conditions.", "multi": false}, {"num": 115, "question": "A CMDB Configuration Manager is reviewing the metrics on the CM DB Health Dashboard's Correctness Scorecard. For the Duplicate metric in the Server class, it sho ws Healthy CIs/Evaluated as 59,000/60,000. What does this indicate about the scope of server records calcu lated under this metric?", "options": {"A": "1,000 server records are in scope for this metric", "B": "60,000 server records are in scope for this metric", "C": "59,000 Linux and 60,000 Windows servers records are in scope for this metric", "D": "59,000 server records are in scope for this metric"}, "answer": "B", "section": "Govern", "explanation": "In the CMDB Health Dashboard, the Evaluated value represents th e total number of configuration items included in the scope of that metric. The Healthy value shows h ow many of those evaluated records meet the metric criteria. Therefore, 59,000 out of 60,000 server rec ords are considered healthy, meaning the metric evaluated 60,000 server records in total.", "multi": false}, {"num": 116, "question": "A CMDB Administrator wants to start utilizing the CMDB Health D ashboard and its Key Performance Indicators. What does the Administrator do to start using the dashboard?", "options": {"A": "Download the dashboard from the ServiceNow store", "B": "Nothing, the dashboard is activated by default", "C": "Activate the dashboard scheduled jobs", "D": "Activate the dashboard system property"}, "answer": "C", "section": "Govern", "explanation": "The CMDB Health Dashboard relies on scheduled jobs to calculate and update the health metrics and KPIs such as Correctness, Completeness, and Compliance. Activat ing the dashboard scheduled jobs enables the system to begin evaluating CI data and populating t he dashboard with the necessary health scores.", "multi": false}, {"num": 117, "question": "Which are CMDB Data Manager end of life policy types? (Choose t wo.)", "options": {"A": "Archive", "B": "Retire", "C": "Lost", "D": "Decommission", "E": "Disposed"}, "answer": "DE", "section": "Govern", "explanation": "CMDB Data Manager end-of-life policy types are used to manage c onfiguration items that have reached the final stages of their lifecycle. Decommission policies appl y when assets are taken out of service and no longer operational, while Disposed policies apply when assets a re permanently removed from the environment. These lifecycle policies help govern how obsolete configuration items are handled in the CMDB.", "multi": true}, {"num": 118, "question": "A CMDB team has noticed that some hardware CIs are missing the serial number information, making it difficult to maintain data accuracy. The team needs a structure d approach to identify and address these gaps. Which accomplishes this task?", "options": {"A": "CI Class Manager", "B": "Service Graph Connectors", "C": "CMDB Data Foundation Playbook"}, "answer": "C", "section": "Govern", "explanation": "CMDB Data Foundations Playbooks provide guided remediation step s to identify and resolve CMDB data quality issues. They help administrators analyze gaps such as m issing key attributes like serial numbers and provide structured guidance to correct the data and improve overall CMDB data quality.", "multi": false}, {"num": 119, "question": "A CMDB Configuration Manager intends to implement CMDB Data Man ager delete and archive policies for all server records in the New York datacenter. In which lifecycle state would servers be affected by these new policies?", "options": {"A": "Missing - Stolen", "B": "Inventory - Available", "C": "End of Life - Retired", "D": "In any lifecycle stale"}, "answer": "C", "section": "Govern", "explanation": "CMDB Data Manager delete and archive policies apply to configur ation items that have reached the end of their lifecycle. Servers must be in the End of Life lifecycle s tage with a status of Retired before these policies can archive or delete the records, ensuring that activ e or operational CIs are not removed from the CMDB.", "multi": false}, {"num": 120, "question": "The CMDB Administrator has been asked to establish Configuratio n Management with a functional CMDB. Which factor is most critical for successfully operationalizing the CMDB in ServiceNow?", "options": {"A": "Populating the CMDB with as much data as possible to ensure a comprehensive inventory of CIs", "B": "Establishing clear governance and continuously monitoring CMD B health", "C": "Allowing IT teams to modify CMDB records as needed to promote flexibility in data management", "D": "Relying on automated discovery tools to maintain and update C MDB records"}, "answer": "B", "section": "Govern", "explanation": "Successful CMDB operationalization depends on strong governance and continuous monitoring of CMDB health. Governance defines ownership, data standards, lifecycle processes, and accountability for configuration items, while health monitoring ensures data quali ty, accuracy, and compliance over time. Without governance, even well-populated CMDBs quickly become un reliable and lose operational value.", "multi": false}, {"num": 121, "question": "Where does a user with the appropriate role(s) review and manag e the generated tasks after configuring CMDB Data Manager policies?", "options": {"A": "CMDB Health Dashboard > Duplicate CIs tab", "B": "CMDB Workspace > My Work tab", "C": "CMDB Health Dashboard > Audit tab", "D": "CMDB Workspace > Management tab"}, "answer": "D", "section": "Govern", "explanation": "Tasks generated by CMDB Data Manager policies are reviewed and managed within CMDB Workspace under the Management tab. This area provides administrators wit h visibility into policy-generated tasks such as certification, attestation, lifecycle, and remediation activities so they can track and resolve CMDB governance tasks.", "multi": false}, {"num": 122, "question": "A Configuration Management Process Owner needs to configure Dat a Manager for policy tasks to be correctly assigned and aligned with the group attribute assigne d to a class in CI Class Manager. Which is the recommended field to be used for a policy task ass ignment?", "options": {"A": "Managed by group", "B": "Change group", "C": "Approval group", "D": "Support group"}, "answer": "A", "section": "Govern", "explanation": "The Managed by group field is the recommended attribute for ass igning CMDB Data Manager policy tasks because it represents the team responsible for managing the con figuration item class. Aligning policy task assignments with this field ensures that remediation, certifica tion, or lifecycle tasks are routed to the appropriate group accountable for the CI.", "multi": false}, {"num": 123, "question": "A CMDB Administrator uses the CMDB Data Foundations Dashboard t o gain insights into the CMDB. The results display low scores for several metrics. Which actions can the CMDB Administrator take to improve the CM DB Health? (Choose two.)", "options": {"A": "Remove non-operational and retired CIs", "B": "Focus on metric(s) with Critical and High priorities", "C": "Adjust the metrics using exclusion rules to improve the score s", "D": "Use the Remediation Playbooks linked beside each metric"}, "answer": "BD", "section": "Govern", "explanation": "Improving CMDB health should focus first on metrics with the hi ghest priority because Critical and High metrics represent the most impactful data quality issues affect ing the CMDB. Remediation Playbooks linked to each metric provide guided analysis and corrective ac tions to systematically resolve those issues and improve the overall CMDB health scores.", "multi": true}, {"num": 124, "question": "Which shows the most complete list of policy types that are pro vided by the CMDB Data Manager?", "options": {"A": "Delete, Attestation, Retire, and Certification", "B": "Attestation, Retire, and Certification", "C": "Archive and Delete", "D": "Retire, Archive, Attestation, Certification, and Delete"}, "answer": "D", "section": "Govern", "explanation": "CMDB Data Manager provides multiple policy types to manage conf iguration item lifecycle and governance. These include Retire and Archive for lifecycle mana gement, Delete for removal of obsolete records, and Attestation and Certification for validating the a ccuracy and existence of configuration items and their data.", "multi": false}, {"num": 125, "question": "The CMDB Administrator group seeks to filler specific CI classe s that display on the CMDB Health Dashboard. This ensures that only relevant data is displayed, e xcluding items that are not ready for management. Which feature can the group utilize to achieve this goal?", "options": {"A": "Reconciliation Rules", "B": "Identification Rules", "C": "Data Refresh Rules", "D": "Health Inclusion Rules"}, "answer": "D", "section": "Govern", "explanation": "Health Inclusion Rules allow administrators to control which CI classes or records are included in CMDB Health calculations and displayed on the CMDB Health Dashboard. By configuring these rules, the CMDB team can filter the scope of evaluated configuration items so t hat only relevant and managed data is included in the health metrics.", "multi": false}, {"num": 126, "question": "A CMDB Administrator is using the Duplicate CI Remediator to ad dress a de-duplication task. On the first lab of the wizard, the Main CI is selected. Which attributes are used to identify the Main CI? (Choose two. )", "options": {"A": "Least Related Items", "B": "Most Related Items", "C": "Newest Created", "D": "Oldest Created"}, "answer": "BD", "section": "Govern", "explanation": "The Duplicate CI Remediator selects the Main CI based on criter ia that indicate the most authoritative record to retain. The CI with the most related items is preferr ed because it represents the record most integrated with other CMDB data. The oldest created record is a lso preferred because it typically represents the original CI that has been referenced over time.", "multi": true}, {"num": 127, "question": "A Configuration Manager needs to enable a CMDB Data Manager pol icy to remove records from a CI Class while retaining the ability to restore them within a spec ified period. Which policy type should the Configuration Manager create?", "options": {"A": "Archive", "B": "Retire", "C": "Certification", "D": "Delete"}, "answer": "A", "section": "Govern", "explanation": "An Archive policy moves configuration item records out of the a ctive CMDB while retaining them in an archived state for a defined period. This allows the records to be restored if needed, providing a safeguard before permanent deletion.", "multi": false}, {"num": 129, "question": "Where can a CMDB 360/Multisource CMDB Saved Query be viewed and created in the CMDB Workspace?", "options": {"A": "Saved queries window on the Insight tab", "B": "CMDB Query Builder", "C": "Coverage window on the CMDB 360 tab", "D": "Saved queries window on the CMDB 360 tab"}, "answer": "D", "section": "Insight", "explanation": "CMDB 360 and Multisource CMDB saved queries are created and acc essed from the Saved Queries window within the CMDB 360 tab in the CMDB Workspace, enabling users to manage and reuse complex CI data views.", "multi": false}, {"num": 130, "question": "An organization is changing data centers and needs to know the consequences of the planned changes. How can Application Service mapping be used as part of Change M anagement?", "options": {"A": "To understand the physical location of CIs", "B": "To identify which devices will go offline first", "C": "To understand the business impact of CIs"}, "answer": "C", "section": "Insight", "explanation": "Application Service mapping provides visibility into relationsh ips between infrastructure and the services they support, enabling Change Management to assess how planned changes will impact business services.", "multi": false}, {"num": 131, "question": "Where can an administrator perform Natural Language Queries (NL Q)?", "options": {"A": "CMDB Data Manager", "B": "CI Class Manager", "C": "CMDB Workspace", "D": "CMDB Health Dashboard"}, "answer": "C", "section": "Insight", "explanation": "Natural Language Queries are available in CMDB Workspace to all ow users to query configuration item data using conversational language for insights and analysis.", "multi": false}, {"num": 132, "question": "A healthcare provider faces a critical incident affecting its p atient management system. The provider needs to determine the users impacted to mitigate disruption effectiv ely. Which CSDM-related data should they leverage?", "options": {"A": "Incident history of similar CIs", "B": "Application Service environment attribute", "C": "Service Offerings by Department or Location", "D": "Affected CI [task_ci] related list"}, "answer": "C", "section": "Insight", "explanation": "Service Offerings segmented by department or location identify the consuming user groups of a service, enabling the organization to determine which users are impacted during an incident.", "multi": false}, {"num": 133, "question": "A Configuration Manager wants to use the Unified Map. Where would it be accessed?", "options": {"A": "CMDB Data Manager", "B": "CI Class Manager", "C": "CMDB Workspace"}, "answer": "C", "section": "Insight", "explanation": "The Unified Map is available within CMDB Workspace to visualize relationships and dependencies across configuration items and services.", "multi": false}, {"num": 134, "question": "A service owner is using Unified Map to understand to compositi on of a service but wants to filter out irrelevant information. Which options are available to the service owner from the filte r panel? (Choose two.)", "options": {"A": "Discovery source", "B": "CI type", "C": "Business critically", "D": "Managed by group"}, "answer": "BC", "section": "Insight", "explanation": "The Unified Map filter panel allows users to refine the service view by CI type and by business criticality to focus on relevant components of the service composition.", "multi": true}, {"num": 135, "question": "A CMDB Administrator wants to create a CMDB query to find all d atabases located in Seattle that are connected to application services. They also want to include in cidents related to those databases. Which actions does the company take to build this query? (Choos e two.)", "options": {"A": "Add to the canvas the Incident table from the Non-CMDB Tables list", "B": "Add a filter to the database node for location=Seattle", "C": "Set the relationship level to ‘Up to 2nd level relationships’", "D": "Add property columns to the application service node"}, "answer": "AB", "section": "Insight", "explanation": "Filtering the database node by location ensures only databases in Seattle are included, and adding the Incident table from the Non-CMDB Tables list enables inclusion of incident records related to those databases in the query results.", "multi": true}, {"num": 136, "question": "The Configuration Management team finds value in the reports fr om CMDB 360/Multisource CMDB and wants to use it for all CI data. Which must be true in order for CMDB 360/Multisource CMDB to be able to report on and analyze that data?", "options": {"A": "Reconciliation rules with priorities must be configured.", "B": "The CI data must be from an authorized Service Graph Connecto r.", "C": "The CI data must go through the IRE.", "D": "ServiceNow Discovery must be used to populate the CI data."}, "answer": "C", "section": "Insight", "explanation": "CMDB 360 and Multisource CMDB rely on normalized and reconciled configuration item data to analyze and present accurate insights. Data must pass through the Ident ification and Reconciliation Engine (IRE) so that configuration items are properly identified, duplicates are prevented, and attributes are reconciled according to CMDB rules. This ensures the data used for reporti ng and analysis is consistent and reliable across all sources.", "multi": false}, {"num": 137, "question": "ServiceNow Event Management significantly benefits from a well- maintained and properly populated CMDB. What are key advantages it provides to Event Management? (Choos e two.)", "options": {"A": "Correlation of alerts to knowledge base articles", "B": "Mapped services provide visibility to the business impact of an alert", "C": "Binding of alerts to specific CIs", "D": "Mapped services provide visibility to users consuming the ser vice"}, "answer": "BC", "section": "Insight", "explanation": "Event Management relies on the CMDB to associate alerts with th e correct configuration items, enabling alerts to be bound directly to the affected infrastructure or a pplication components. Service mapping in the CMDB also allows Event Management to understand how those compo nents support business services, which provides visibility into the business impact when an aler t occurs.", "multi": true}, {"num": 138, "question": "A CMDB Administrator needs insights into how their CMDB is conf igured according to ServiceNow recommended practice. Which should be used?", "options": {"A": "CMDB Health Dashboard", "B": "CMDB Workspace", "C": "CMDB Data Manager", "D": "CMDB Data Foundation Dashboard"}, "answer": "D", "section": "Insight", "explanation": "The CMDB Data Foundations Dashboard provides visibility into ho w the CMDB is configured and operated compared with ServiceNow recommended practices. It evaluates ke y configuration areas, identifies gaps or misconfigurations, and provides insights and remediation gui dance to align the CMDB with Data Foundations standards.", "multi": false}, {"num": 139, "question": "What is the value of using the CMDB in security operations? (Ch oose two.)", "options": {"A": "Auto-resolves a vulnerability", "B": "Identifies the IT infrastructure with a vulnerability", "C": "Enables audits and attestations across CIs", "D": "Allows security team to assess and remediate an incident"}, "answer": "BD", "section": "Insight", "explanation": "The CMDB provides visibility into the infrastructure and config uration items across the environment, allowing security operations to identify which assets are affec ted by vulnerabilities. It also supports incident response by giving security teams contextual information about affected systems and their relationships, enabling them to properly assess the impact and coordinate reme diation activities.", "multi": true}, {"num": 140, "question": "The CMDB Configuration Management team has successfully develop ed a healthy and trusted CMDB. They have integrated discovered infrastructure data, accurately referenced non-discoverable data (such as change and support group information), and made the CMDB servic e-aware using Service Mapping. How will these improvements enhance the change management proce ss? (Choose two.)", "options": {"A": "Provides insight into the potential impact of the change", "B": "Ensures that no changes result in service downtime, regardles s of planning or execution", "C": "Automatically schedules and deploys changes without human rev iew or approval", "D": "Enables auto population of the assignment group field to dyna mically route changes"}, "answer": "AD", "section": "Insight", "explanation": "A well-maintained and service-aware CMDB provides visibility in to relationships between infrastructure components and business services. This allows change management to understand the potential impact of a proposed change on dependent services and systems before impl ementation. The CMDB also stores ownership and support group information for configuration items , enabling the assignment group to be automatically populated so that change tasks are routed to the appropriate responsible teams.", "multi": true}, {"num": 141, "question": "A CMDB Manager uses CMDB 360/Multisource CMDB to maintain and i mprove CMDB quality. Why would the Manager use CMDB 360/Multisource CMDB?", "options": {"A": "To identify CI attributes from multiple data sources", "B": "To ingest data from multiple data sources using Import Set(s)", "C": "To populate the CMDB from multiple data sources", "D": "To ingest data from multiple data sources using Service Graph Connector(s)"}, "answer": "A", "section": "Insight", "explanation": "CMDB 360 and Multisource CMDB provide visibility into configura tion item attributes coming from multiple data sources. This capability allows administrators to analyze which sources contribute specific attribute values, compare them, and evaluate data quality across sources to maintain and improve CMDB accuracy.", "multi": false}, {"num": 142, "question": "A CMDB Administrator is comparing the Unified Map to the Servic e Mapping map. What are additional capabilities of the Unified Map? (Choose tw o.)", "options": {"A": "Number of levels displayed on a map can be modified", "B": "Visibility to an application and the host it is installed on", "C": "Map nodes can be filtered based on user preferences", "D": "Map can be zoomed in and out"}, "answer": "AC", "section": "Insight", "explanation": "The Unified Map provides enhanced visualization controls compar ed to the standard Service Mapping map. It allows users to modify the number of dependency levels displayed in the map to better control the scope of the visualization. It also supports filtering of map n odes based on user preferences, enabling users to focus on specific CI types or relationships when analy zing service topology.", "multi": true}, {"num": 143, "question": "A Service Desk Manager wants to leverage the Unified Map to fin d active incidents or problems for a selected CI. Which panel will give the manager visibility and details?", "options": {"A": "Overview", "B": "Attributes", "C": "Related items", "D": "Application services"}, "answer": "C", "section": "Insight", "explanation": "The Related items panel in the Unified Map displays records ass ociated with the selected configuration item, such as incidents, problems, changes, and other related t asks. This panel allows users to quickly view and access active incidents or problems linked to the CI, providing operational context directly from the topology view.", "multi": false}, {"num": 144, "question": "A CMDB Administrator wants to educate the team on the various a ctions that can be performed within the CMDB Workspace. What actions can be initiated from the CMDB Workspace? (Choose two.)", "options": {"A": "Create a new CMDB class", "B": "Execute ServiceNow Discovery", "C": "Remediate duplicate CI records", "D": "Create a CMDB Data Manager certification policy"}, "answer": "BC", "section": "Insight", "explanation": "CMDB Workspace provides operational tools that allow administra tors to initiate CMDB-related actions such as launching Discovery to populate or update configuration items and resolving data quality issues like duplicate CI records. These capabilities support monitorin g, troubleshooting, and remediation activities directly from the workspace interface.", "multi": true}, {"num": 145, "question": "A CMDB Administrator knows that the CMDB Data Foundation Dashbo ard is a resource to monitor and improve data quality. What is a benefit of this dashboard?", "options": {"A": "Provides the ability to resolve certification policy tasks", "B": "Provides the ability to configure health-related metrics", "C": "Provides key health-related metrics to make decisions"}, "answer": "C", "section": "Insight", "explanation": "The CMDB Data Foundations Dashboard provides visibility into ke y CMDB health and governance metrics, allowing administrators to evaluate data quality, conf iguration alignment, and operational effectiveness. These insights help teams identify issues and ma ke informed decisions to improve the quality and reliability of CMDB data.", "multi": false}, {"num": 146, "question": "A CMDB Administrator is asked to create a query using the CMDB Query Builder that displays all operational CIs belonging to a specific application service. Which steps provide the desired outcome?", "options": {"A": "1. Add the Business Application, Application Service, and Con figuration Item classes to the canvas. 2. Define a filter for the application service name and the ope rational status of the configuration items. 3. Configure the relationship between the classes. 4. Run the query.", "B": "1. Add the Application Service and Configuration Item classes to the canvas. 2. Configure the relationship between the classes. 3. Define a filter for the application service name and the ope rational status of the configuration items. 4. Run the query.", "C": "1. Add the Application Service and Configuration Item classes to the canvas. 2. Configure the relationship between the classes. 3. Add the Operational Status and Name fields as columns. 4. Run the query."}, "answer": "B", "section": "Insight", "explanation": "To query all operational configuration items belonging to a spe cific application service in CMDB Query Builder, the Application Service and Configuration Item classes must be added to the canvas and connected through their relationship. Filters are then applied to specify the application service name and ensure the configuration items have an operational status indic ating they are active, after which the query can be executed to return the relevant results.", "multi": false}, {"num": 147, "question": "A Configuration Manager wants to explore ServiceNow CMDB 360 sa ved queries to see if the reports can assist with managing of CMDB data. What insights are gained from CMDB 360 queries? (Choose two.)", "options": {"A": "Gaps in attribute data from different data sources", "B": "Unique CIs created from different data sources", "C": "Different attribute values from different data sources", "D": "Orphan CIs created from different data sources", "E": "Duplicate configuration items from different data sources"}, "answer": "AC", "section": "Insight", "explanation": "CMDB 360 saved queries provide visibility into attribute data c oming from multiple sources for the same configuration item. These queries help identify gaps where cert ain attributes are missing from specific data sources and highlight situations where different sources provid e conflicting attribute values for the same CI, enabling administrators to assess and improve CMDB data qua lity.", "multi": true}, {"num": 148, "question": "A CMDB Administrator wants to leverage the CMDB Data Foundation s Dashboard. What are benefits of using this application?", "options": {"A": "Checks that important data is valid and properly configured", "B": "Has a framework to create custom metrics for the CMDB", "C": "Provides playbooks to assist in the remediation of potential risks", "D": "Uses automation to remediate potential risks"}, "answer": "AC", "section": "Insight", "explanation": "The CMDB Data Foundations Dashboard evaluates CMDB configuratio n and data against ServiceNow best practices to verify that important data elements and confi gurations are valid and correctly set up. It also provides remediation playbooks that guide administrators t hrough analyzing and resolving potential CMDB risks and data quality issues.", "multi": true}, {"num": 149, "question": "A Service Owner needs to view related items, such as Active Inc idents and Planned Changes, directly on the home node of the Unified Map. Which work area would allow the Service Owner to meet this goal ?", "options": {"A": "Map", "B": "Tool box", "C": "Content controls", "D": "Contextual side panel"}, "answer": "D", "section": "Insight", "explanation": "The Contextual side panel in the Unified Map displays detailed information and related records for the selected node, including items such as active incidents, proble ms, and planned changes. This panel provides operational context for the configuration item directl y from the map interface.", "multi": false}, {"num": 150, "question": "A CMDB Administrator wants to use the CMDB and CSDM Data Founda tions Dashboard. Where can the Administrator obtain the dashboard?", "options": {"A": "It is a free application on the ServiceNow Innovation Lab.", "B": "It is active by default.", "C": "It is a free application on the ServiceNow Store.", "D": "It is a paid application on the ServiceNow Store."}, "answer": "C", "section": "Insight", "explanation": "The CMDB and CSDM Data Foundations Dashboard is provided as a f ree application available on the ServiceNow Store. Administrators install it from the Store to g ain visibility into CMDB configuration alignment, CSDM adoption, and data quality metrics, along with remediation guidance.", "multi": false}, {"num": 151, "question": "A Configuration Manager working in the CMDB Workspace wants to see how CIs are connected to each other. Which tool can be used?", "options": {"A": "Relationship Map", "B": "Business Service Map", "C": "Unified Map"}, "answer": "C", "section": "Insight", "explanation": "The Unified Map in CMDB Workspace provides a visual representat ion of how configuration items are connected through relationships and dependencies. It allows use rs to explore CI topology, view upstream and downstream relationships, and understand how infrastructure and services are linked within the CMDB.", "multi": false}, {"num": 152, "question": "An organization is using CMDB Query Builder to find all applica tion services with a database that has incidents and all infrastructure in those application services. Which steps does the organization take to build this query? (Ch oose two.)", "options": {"A": "Use a CMDB Query to include application services and their re lated infrastructure", "B": "Use a Service Mapping Query to find all incidents related to the database", "C": "Use a Service Mapping Query to include non-CMDB tables like t he Incident table", "D": "Add a non-CMDB table to the query"}, "answer": "AD", "section": "Insight", "explanation": "CMDB Query Builder allows users to combine CMDB classes and non -CMDB tables within a query. A CMDB query is used to include application services and their re lated infrastructure by leveraging relationships between configuration items. A non-CMDB table, su ch as the Incident table, can also be added to the query to include incident data associated with the database CIs.", "multi": true}, {"num": 153, "question": "In a company there is a need to understand the CSDM maturity le vel needed. Different stakeholders listed a number of use cases that they expect over time. Which use case requires information objects?", "options": {"A": "The Event Operations team wants to automate their events into incident for operational actions.", "B": "The Business Service Management team wants to understand the operational impact for their consumer parties.", "C": "The Customer Service team wants to onboard pro-active case ma nagement.", "D": "The SecOps team wants to understand the operational risk in t he Business Application context.", "E": "The Asset Management wants to understand to asset life cycle compliancy in a Business Application context."}, "answer": "B", "section": "CSDM Fundamentals", "explanation": "Understanding operational impact for consumer parties requires modeling relationships between services and the parties that consume them, which is achieved through In formation Objects in CSDM to represent service consumption and enable impact analysis from a business perspective.", "multi": false}, {"num": 154, "question": "A Platform Owner is collaborating with stakeholders in the manu facturing industry to align their CIs with the CSDM 5 framework. They need to map production line monitoring s ystems to the appropriate CSDM domain. Which CSDM 5 domain does the Platform Owner use?", "options": {"A": "Build and Integration (Build)", "B": "Service Delivery (Manage Technical)", "C": "Service Consumption (Sell/Consume)", "D": "Design and Planning (Design)", "E": "Foundation"}, "answer": "B", "section": "CSDM Fundamentals", "explanation": "Production line monitoring systems are technical capabilities u sed to operate and support services, which are modeled in the Service Delivery domain to represent the tec hnical service components that enable ongoing service management and operations.", "multi": false}, {"num": 155, "question": "A development team is working on a project and an application w ill be deployed to many servers. There will be several security requirements that must be checked to a dhere to lawful compliance because the application will be holding customer personal data (PII and PCI ). Where in the CSDM does the development team look to store the i nformation that will be used to satisfy the audits?", "options": {"A": "Technology Management Service Offerings (Technical Service Of ferings) and Dynamic CI Groups", "B": "Business Applications and Information Objects", "C": "Customer Service Offerings and Databases"}, "answer": "B", "section": "CSDM Fundamentals", "explanation": "Business Applications define the application context, while Inf ormation Objects represent the regulated data such as PII and PCI associated with that application, enab ling governance and auditability for compliance requirements.", "multi": false}, {"num": 156, "question": "A customer’s CMDB is aligned to the CSDM Walk stage. What benefit is provided by the CMDB?", "options": {"A": "Enables impact assessments for incident, problem, and change on Business Services", "B": "Improves the implementation velocity of APM Foundation for fu ture business application rationalization", "C": "Allows for additional stratification of Technical team’s supp ort structure along the lines of OLAs and commitments"}, "answer": "A", "section": "CSDM Fundamentals", "explanation": "At the Walk stage of CSDM maturity, the CMDB enables service-aw are operations by supporting impact analysis across incidents, problems, and changes through establ ished relationships to Business Services.", "multi": false}, {"num": 158, "question": "A CMDB Administrator wants to improve data quality related to t he CSDM. Which action should the Administrator take to meet this goal?", "options": {"A": "Use the default configured CMDB Health Dashboard", "B": "Start the ServiceNow Health Scan", "C": "Use the CSDM Data Foundation Dashboard"}, "answer": "C", "section": "CSDM Fundamentals", "explanation": "The CSDM Data Foundation Dashboard provides targeted insights a nd guidance to improve CMDB data quality specifically aligned with CSDM structure and adoption.", "multi": false}, {"num": 159, "question": "According to the Common Service Data Model (CSDM), a server tea m is requesting a catalog item be created for infrastructure upgrade requests. Which role is involved in initiating the request and defining r equirements?", "options": {"A": "Enterprise Architecture", "B": "Technology Service Owners", "C": "Application Service Owners"}, "answer": "B", "section": "CSDM Fundamentals", "explanation": "Technology Service Owners are responsible for defining and init iating infrastructure-related service requests, such as upgrades, within the service delivery model.", "multi": false}, {"num": 160, "question": "A CMDB Administrator is evaluating whether to monitor the metri cs provided on the CMDB Foundation Dashboard. Which benefits support the decision to continually monitor the results on this dashboard? (Choose two.)", "options": {"A": "Provides a list of all CIs that failed health audits", "B": "Provides metrics for CIs Processed by the IRE", "C": "Provides metrics on active CIs updated in the last 90 days", "D": "Reports on all orphan CIs in the CMDB"}, "answer": "BC", "section": "CSDM Fundamentals", "explanation": "The CMDB Foundation Dashboard provides visibility into ingestio n activity through metrics on CIs processed by the Identification and Reconciliation Engine and t racks recently updated active CIs to help assess data freshness and adoption.", "multi": true}, {"num": 161, "question": "The Configuration Manager is preparing the justification to uti lize the CMDB Data Foundations Dashboard. Which benefits align with the usage of this dashboard? (Choose two.)", "options": {"A": "It enables monitoring and tracking of CMDB health over time.", "B": "It provides actionable insights to improve data quality and c ompleteness.", "C": "It helps detect and eliminate duplicate records in the CMDB.", "D": "It automates the approval process for change management."}, "answer": "AB", "section": "CSDM Fundamentals", "explanation": "The CMDB Data Foundations Dashboard enables ongoing monitoring of foundational CMDB health and provides actionable insights to improve data quality and comple teness aligned with CSDM adoption.", "multi": true}, {"num": 162, "question": "A Change Manager wants to gain value from CSDM. How will the Change Management process benefit from CSDM? (Choo se two.)", "options": {"A": "Identify blackout windows for the change", "B": "Determine the root cause of the change issue", "C": "Understand the impact of the change on services", "D": "Route the change dynamically"}, "answer": "AC", "section": "CSDM Fundamentals", "explanation": "CSDM enables service-aware change planning by supporting identi fication of blackout windows tied to service commitments and by providing visibility into how propos ed changes will impact business and technical services.", "multi": true}, {"num": 163, "question": "Which are business values of CMDB? (Choose two.)", "options": {"A": "Collecting and managing financial data", "B": "Streaming incident and change management", "C": "Strengthening operational resiliency", "D": "Automating maintenance for CI relationships"}, "answer": "BC", "section": "CSDM Fundamentals", "explanation": "A CMDB streamlines incident and change management through servi ce-aware context and strengthens operational resiliency by improving visibility into infrastruct ure and service dependencies.", "multi": true}, {"num": 164, "question": "A CMDB Administrator is implementing a Vulnerability Response o r Security Incident Response and needs to ensure customers have enough context to estimate risk and se t task priorities. Which Get Well Playbook from the CSDM Data Foundation Dashboard helps with this?", "options": {"A": "Locations without a Parent Location", "B": "Named Product Models without Product Owners", "C": "Percentage of Custom Status Values for CI Life Cycle Stages", "D": "Application Services with Business Application Relationships"}, "answer": "D", "section": "CSDM Fundamentals", "explanation": "Linking Application Services to Business Applications provides the business context needed to assess risk and prioritize security or vulnerability tasks based on service impact.", "multi": false}, {"num": 165, "question": "A CMDB Administrator wants to run the Services Have Owners Iden tified playbook to remediate the issues shown in the CMDB Data Foundations Dashboard. Which remediation plays would be used? (Choose two.)", "options": {"A": "Govern Data", "B": "Fix Data", "C": "Report Data", "D": "Analyze Data"}, "answer": "BD", "section": "CSDM Fundamentals", "explanation": "The playbook uses Analyze Data to assess ownership gaps and Fix Data to assign appropriate owners to services for remediation.", "multi": true}, {"num": 166, "question": "A Configuration Management Governance team is transitioning fro m utilizing legacy CMDB status fields to CSDM life cycle status fields. Which table can be modified?", "options": {"A": "Life Cycle Stages [life_cycle_stage]", "B": "Life Cycle Mapping [life_cycle_mapping]", "C": "Life Cycle Controls [life_cycle_control]", "D": "Life Cycle Stage Status [life_cycle_stage_status]"}, "answer": "B", "section": "CSDM Fundamentals", "explanation": "Life Cycle Mapping is the table used to align legacy CMDB statu s values with the standardized CSDM life cycle stage and status values during the transition.", "multi": false}, {"num": 167, "question": "A CMDB Administrator, viewing the CMDB Data Foundations Dashboa rd, notices the Unique Locations Result percentage low. What is the recommended process from the associated playbook to correct this issue?", "options": {"A": "Review both locations, update CIs with the correct location a nd delete the duplicate location", "B": "Retain the location that matches the organization’s standard naming convention, and delete the duplicate without further validation", "C": "Keep both locations as either can be used as a valid alternat e location", "D": "Use the Duplicate CI Remediator the merge the duplicate locat ion records"}, "answer": "A", "section": "CSDM Fundamentals", "explanation": "The playbook recommends validating the correct location by revi ewing both records, updating associated CIs to reference the accurate location, and then removing the d uplicate to maintain standardized and unique location data.", "multi": false}, {"num": 169, "question": "A Configuration Manager is planning the implementation of the C MDB. Which is the prescribed CSDM rollout order?", "options": {"A": "Architecture, Business, Technical, Governance", "B": "Initiate, Plan, Execute, Deliver, Close", "C": "Foundation, Crawl, Walk, Run, Fly", "D": "Initial, Developing, Defined, Managed"}, "answer": "C", "section": "CSDM Fundamentals", "explanation": "The prescribed CSDM rollout follows a maturity-based approach t hat progresses through Foundation, Crawl, Walk, Run, and Fly stages.", "multi": false}, {"num": 171, "question": "A CSDM Data Manager needs metrics on the alignment of product m odels, locations, and business units with best practices. Which tab in the CSDM Data Foundations Dashboard provides this information?", "options": {"A": "Fly", "B": "Crawl", "C": "Foundation", "D": "Run", "E": "Walk"}, "answer": "C", "section": "CSDM Fundamentals", "explanation": "The Foundation tab of the CSDM Data Foundations Dashboard provi des metrics that evaluate whether foundational data elements such as product models, locations, a nd business units are properly aligned with recommended CSDM best practices. These foundational elemen ts support the overall service model and ensure the CMDB structure is correctly established before a dvancing to higher maturity stages.", "multi": false}, {"num": 172, "question": "A Service Portfolio Manager wants to know what Application Serv ices their Business Service Offerings depend on. What stage of CSDM would map this relationship?", "options": {"A": "Foundation", "B": "Fly", "C": "Run", "D": "Walk", "E": "Crawl"}, "answer": "D", "section": "CSDM Fundamentals", "explanation": "The Walk stage of CSDM introduces the relationship between busi ness services, their service offerings, and the underlying application services that support them. This stage focuses on mapping how business service offerings depend on application services, enabling visi bility into how applications support business capabilities and services.", "multi": false}, {"num": 173, "question": "An Enterprise Architect of a financial services company is work ing across the enterprise and wants to track their capabilities. Which CSDM 5 domain is used?", "options": {"A": "Build and Integration (Build)", "B": "Design and Planning (Design)", "C": "Service Delivery (Manage Technical)", "D": "Service Consumption (Sell/Consume)", "E": "Foundation"}, "answer": "B", "section": "CSDM Fundamentals", "explanation": "The Design and Planning domain in CSDM is used to model enterpr ise architecture elements such as business capabilities. This domain supports strategic planning and architecture activities by defining capabilities, value streams, and other structures that describe what the organization does and how it plans and designs its services an // ===== LOCAL STORAGE =====
const STORAGE_KEY = 'cis-df-quiz-state';

function saveState() {
  const data = {
    answers: state.answers,
    currentIndex: state.currentIndex,
    mode: state.mode,
    shuffleMode: state.shuffleMode,
    questionOrder: state.questionOrder,
    started: state.started,
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!data.answers || Object.keys(data.answers).length === 0) return null;
    return data;
  } catch (e) {
    return null;
  }
}

function clearSavedState() {
  localStorage.removeItem(STORAGE_KEY);
}

// ===== STATE =====
let state = {
  currentIndex: 0,
  answers: {},       // qNum -> { selected: [], correct: bool|null }
  mode: null,        // 'practice' | 'exam'
  shuffleMode: false, // random order
  questionOrder: [], // ordered array of q.nums
  filter: 'all',
  sectionFilter: 'all',
  filteredQuestions: [],
  started: false,
};

// ===== INIT =====
function init() {
  // Get unique sections
  const sections = [...new Set(QUESTIONS.map(q => q.section).filter(Boolean))].sort();
  const sel = document.getElementById('sectionFilter');
  sections.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });

  sel.addEventListener('change', () => {
    state.sectionFilter = sel.value;
    applyFilters();
    saveState();
  });

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.filter = btn.dataset.filter;
      applyFilters();
      saveState();
    });
  });

  applyFilters();

  // Check for saved progress
  const saved = loadState();
  if (saved) {
    renderWelcome(saved);
  } else {
    renderWelcome(null);
  }
}

function applyFilters() {
  // Start from questionOrder if available, otherwise from QUESTIONS
  let qs;
  if (state.questionOrder && state.questionOrder.length > 0) {
    qs = state.questionOrder.map(num => QUESTIONS.find(q => q.num === num)).filter(Boolean);
  } else {
    qs = [...QUESTIONS];
  }

  if (state.sectionFilter !== 'all') {
    qs = qs.filter(q => q.section === state.sectionFilter);
  }
  if (state.filter === 'unanswered') {
    qs = qs.filter(q => !state.answers[q.num]);
  } else if (state.filter === 'correct') {
    qs = qs.filter(q => state.answers[q.num]?.correct === true);
  } else if (state.filter === 'wrong') {
    qs = qs.filter(q => state.answers[q.num]?.correct === false);
  }
  state.filteredQuestions = qs;

  // Clamp currentIndex to valid range
  if (state.currentIndex >= qs.length && qs.length > 0) {
    state.currentIndex = qs.length - 1;
  }
  if (state.currentIndex < 0) state.currentIndex = 0;

  renderNav();
  updateStats();
}

function renderNav() {
  const nav = document.getElementById('questionNav');
  nav.innerHTML = '';
  state.filteredQuestions.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'q-btn';
    if (i === state.currentIndex) btn.classList.add('active');
    const ans = state.answers[q.num];
    if (ans?.correct === true) btn.classList.add('answered-correct');
    else if (ans?.correct === false) btn.classList.add('answered-wrong');
    if (q.multi) btn.classList.add('multi-indicator');
    btn.textContent = q.num;
    btn.addEventListener('click', () => {
      state.currentIndex = i;
      saveState();
      renderQuestion();
      renderNav();
    });
    nav.appendChild(btn);
  });
}

function updateStats() {
  const answered = Object.values(state.answers).filter(a => a.correct !== null);
  const correct = answered.filter(a => a.correct === true).length;
  const wrong = answered.filter(a => a.correct === false).length;
  const remaining = QUESTIONS.length - answered.length;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('remainingCount').textContent = remaining;
  const pct = QUESTIONS.length > 0 ? (answered.length / QUESTIONS.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ===== WELCOME SCREEN =====

function startQuiz(mode) {
  state.mode = mode;
  state.started = true;
  state.currentIndex = 0;

  // Check shuffle checkbox
  const shuffleCheck = document.getElementById('shuffleCheckbox');
  state.shuffleMode = shuffleCheck ? shuffleCheck.checked : false;

  // Generate question order
  if (state.shuffleMode) {
    state.questionOrder = [...QUESTIONS.map(q => q.num)].sort(() => Math.random() - 0.5);
  } else {
    state.questionOrder = QUESTIONS.map(q => q.num);
  }

  saveState();
  applyFilters();
  renderQuestion();
}

function continueQuiz() {
  const saved = loadState();
  if (!saved) return;

  state.answers = saved.answers || {};
  state.mode = saved.mode || 'practice';
  state.shuffleMode = saved.shuffleMode || false;
  state.questionOrder = saved.questionOrder || QUESTIONS.map(q => q.num);
  state.started = true;
  state.currentIndex = saved.currentIndex || 0;

  // If all questions answered, jump to first one
  if (state.currentIndex >= state.questionOrder.length) {
    state.currentIndex = 0;
  }

  saveState();
  applyFilters();
  renderQuestion();
}

function showNewQuizOptions() {
  // Show fresh start screen with shuffle toggle
  clearSavedState();
  state.answers = {};
  state.currentIndex = 0;
  state.mode = null;
  state.shuffleMode = false;
  state.questionOrder = [];
  state.started = false;
  renderWelcome(null);
}

function restartQuiz() {
  if (confirm('确定要重新开始吗？所有答题记录将被清除。')) {
    clearSavedState();
    state.answers = {};
    state.currentIndex = 0;
    state.mode = null;
    state.shuffleMode = false;
    state.questionOrder = [];
    state.started = false;
    applyFilters();
    renderWelcome(null);
    showToast('🔄 已重置，可以重新开始', 'success');
  }
}

// ===== RENDER QUESTION =====
function renderQuestion() {
  if (state.filteredQuestions.length === 0) {
    document.getElementById('mainContent').innerHTML = `
      <div class="question-card">
        <div class="welcome">
          <div class="welcome-icon">🔍</div>
          <h2>没有匹配的题目</h2>
          <p>当前筛选条件下没有题目，请调整筛选条件</p>
        </div>
      </div>`;
    return;
  }

  const q = state.filteredQuestions[state.currentIndex];
  const ans = state.answers[q.num];
  const isAnswered = ans && ans.correct !== null;
  const selected = ans?.selected || [];

  const main = document.getElementById('mainContent');
  const letters = Object.keys(q.options).sort();

  let optionsHtml = letters.map(letter => {
    let cls = 'option-item';
    let iconHtml = '';
    const isSelected = selected.includes(letter);
    const isCorrectOption = q.answer.includes(letter);

    if (isAnswered) {
      cls += ' disabled';
      if (isSelected && isCorrectOption) {
        cls += ' correct';
        iconHtml = '<span class="option-icon">✅</span>';
      } else if (isSelected && !isCorrectOption) {
        cls += ' wrong';
        iconHtml = '<span class="option-icon">❌</span>';
      } else if (!isSelected && isCorrectOption) {
        cls += ' show-correct';
        iconHtml = '<span class="option-icon">✅</span>';
      }
    } else {
      if (isSelected) cls += ' selected';
    }

    return `
      <div class="${cls}" data-letter="${letter}" onclick="selectOption(${q.num}, '${letter}')">
        <div class="option-letter">${letter}</div>
        <div class="option-text">${escapeHtml(q.options[letter])}</div>
        ${iconHtml}
      </div>
    `;
  }).join('');

  let bannerHtml = '';
  if (isAnswered) {
    if (ans.correct) {
      bannerHtml = `<div class="result-banner correct-banner show"><span class="result-icon">🎉</span> 回答正确！</div>`;
    } else {
      bannerHtml = `<div class="result-banner wrong-banner show"><span class="result-icon">😞</span> 回答错误！正确答案：${q.answer.split('').join(', ')}</div>`;
    }
  }

  let explanationHtml = '';
  if (isAnswered && q.explanation) {
    explanationHtml = `
      <div class="explanation show">
        <div class="explanation-title">📖 解析</div>
        <div class="explanation-text">${escapeHtml(q.explanation)}</div>
      </div>
    `;
  }

  const canSubmit = !isAnswered && selected.length > 0;
  const submitLabel = q.multi ? `提交答案（已选 ${selected.length} 项）` : '提交答案';

  main.innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-badge number">Q${q.num}</span>
        <span class="q-badge section">${escapeHtml(q.section || 'General')}</span>
        ${q.multi ? '<span class="q-badge multi">多选题</span>' : '<span class="q-badge multi" style="background:rgba(34,197,94,0.15);color:#4ade80">单选题</span>'}
      </div>
      <div class="q-text">${escapeHtml(q.question)}</div>
      ${bannerHtml}
      <div class="options-list">${optionsHtml}</div>
      <div class="actions">
        ${!isAnswered ? `<button class="btn btn-primary" id="submitBtn" ${canSubmit ? '' : 'disabled'} onclick="submitAnswer(${q.num})">${submitLabel}</button>` : ''}
        ${isAnswered && state.mode === 'practice' ? `<button class="btn btn-secondary" onclick="retryQuestion(${q.num})">重新作答</button>` : ''}
      </div>
      ${explanationHtml}
      <div class="nav-bar">
        <button class="btn btn-secondary" onclick="prevQuestion()" ${state.currentIndex === 0 ? 'disabled' : ''}>← 上一题</button>
        <span style="color:var(--text-muted);font-size:13px;align-self:center">${state.currentIndex + 1} / ${state.filteredQuestions.length}</span>
        <button class="btn btn-secondary" onclick="nextQuestion()" ${state.currentIndex >= state.filteredQuestions.length - 1 ? 'disabled' : ''}>下一题 →</button>
      </div>
    </div>
  `;
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ===== SELECT OPTION =====
function selectOption(qNum, letter) {
  const q = QUESTIONS.find(q => q.num === qNum);
  if (!q) return;
  const ans = state.answers[qNum];
  if (ans && ans.correct !== null) return; // already answered

  if (!state.answers[qNum]) {
    state.answers[qNum] = { selected: [], correct: null };
  }

  const selected = state.answers[qNum].selected;
  const idx = selected.indexOf(letter);

  if (q.multi) {
    // Multi-select: toggle
    if (idx >= 0) selected.splice(idx, 1);
    else selected.push(letter);
  } else {
    // Single-select: replace
    state.answers[qNum].selected = [letter];
  }

  renderQuestion();
}

// ===== SUBMIT ANSWER =====
function submitAnswer(qNum) {
  const q = QUESTIONS.find(q => q.num === qNum);
  if (!q) return;
  const ans = state.answers[qNum];
  if (!ans || ans.selected.length === 0) return;

  const selectedSorted = [...ans.selected].sort().join('');
  const correctSorted = q.answer.split('').sort().join('');
  ans.correct = selectedSorted === correctSorted;

  renderQuestion();
  renderNav();
  updateStats();
  saveState();

  if (!ans.correct) {
    showToast('❌ 回答错误', 'error');
  }
}

// ===== RETRY =====
function retryQuestion(qNum) {
  state.answers[qNum] = { selected: [], correct: null };
  saveState();
  renderQuestion();
  renderNav();
  updateStats();
}

// ===== NAVIGATION =====
function prevQuestion() {
  if (state.currentIndex > 0) {
    state.currentIndex--;
    saveState();
    renderQuestion();
    renderNav();
  }
}

function nextQuestion() {
  if (state.currentIndex < state.filteredQuestions.length - 1) {
    state.currentIndex++;
    saveState();
    renderQuestion();
    renderNav();
  }
}

// ===== TOAST =====
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => { toast.classList.remove('show'); }, 2000);
}

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
  if (!state.started) return;
  if (e.key === 'ArrowLeft') prevQuestion();
  else if (e.key === 'ArrowRight') nextQuestion();
  else if (e.key === 'Enter') {
    const q = state.filteredQuestions[state.currentIndex];
    if (q) submitAnswer(q.num);
  }
  else if ('abcdef'.includes(e.key.toLowerCase())) {
    const q = state.filteredQuestions[state.currentIndex];
    if (q) selectOption(q.num, e.key.toUpperCase());
  }
});

// START
init();
</script>
</body>
</html>
